<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Veille politique</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif}
.mc{background:#0a0a0f;color:#e8e8e8;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #222}
.title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.subtitle{font-size:12px;color:#666;margin-top:4px}
.top-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.metric{background:#12121a;border:1px solid #222;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.source-list{display:flex;flex-direction:column;gap:4px}
.source-item{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.source-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rep-row:last-child{margin-bottom:0}
.rep-name{font-size:12px;font-weight:600;width:110px;flex-shrink:0}
.rep-bar-wrap{flex:1;height:5px;background:#1e1e2a;border-radius:3px}
.rep-bar{height:5px;border-radius:3px}
.rep-count{font-size:11px;color:#555;width:24px;text-align:right;flex-shrink:0}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;opacity:.6}
.pill:hover{opacity:.85;transform:scale(1.05)}
.pill.active{opacity:1;transform:scale(1.08);border-width:2px}
.articles-section{background:#12121a;border:1px solid #222;border-radius:10px;padding:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-bottom:1px solid #1a1a24;border-radius:6px;text-decoration:none}
.article-row:hover{background:#16161e}
.article-row:last-child{border-bottom:none}
.theme-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px}
.art-title{font-size:13px;color:#ddd;line-height:1.4;font-weight:500}
.art-resume{font-size:11px;color:#888;margin-top:4px;line-height:1.4}
.art-meta{font-size:11px;margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.src-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#1e1e2a;color:#bbb;font-weight:700}
.date-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#0a1a2a;color:#38bdf8;font-weight:700}
</style>
</head>
<body>
<div class="mc">
  <div class="header">
    <div class="title">Veille politique</div>
    <div class="subtitle">mardi 14 avril 2026 — 16 articles analysés</div>
  </div>
  <div class="top-metrics">
    <div class="metric">
      <div class="metric-label">Sources</div>
      <div class="source-list"><div class="source-item"><div class="source-dot"></div>Le Monde - Politique</div><div class="source-item"><div class="source-dot"></div>Les Echos - politique & société</div><div class="source-item"><div class="source-dot"></div>Le Figaro - Politique</div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Répartition thèmes</div>
      <div class="rep-row"><span class="rep-name" style="color:#1D9E75">Macron</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:44%;background:#1D9E75"></div></div><span class="rep-count">4</span></div><div class="rep-row"><span class="rep-name" style="color:#BA7517">Droite</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:22%;background:#BA7517"></div></div><span class="rep-count">2</span></div><div class="rep-row"><span class="rep-name" style="color:#888780">Institutionnel</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:100%;background:#888780"></div></div><span class="rep-count">9</span></div><div class="rep-row"><span class="rep-name" style="color:#4a7ac8">RN</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:11%;background:#1a3a6e"></div></div><span class="rep-count">1</span></div>
    </div>
  </div>
  <div class="filter-pills" id="pills"><div class="pill" data-f="Macron" data-color="#1D9E75" style="color:#1D9E75;border-color:#1D9E7544;background:#1D9E7511">Macron (4)</div><div class="pill" data-f="Droite" data-color="#BA7517" style="color:#BA7517;border-color:#BA751744;background:#BA751711">Droite (2)</div><div class="pill" data-f="Institutionnel" data-color="#888780" style="color:#888780;border-color:#88878044;background:#88878011">Institutionnel (9)</div><div class="pill" data-f="RN" data-color="#4a7ac8" style="color:#4a7ac8;border-color:#4a7ac844;background:#1a3a6e11">RN (1)</div><div class="pill" data-f="all" data-color="#fff" style="color:#fff;border-color:#ffffff44;background:#ffffff11">Tous (16)</div></div>
  <div class="articles-section">
    <div class="section-header">
      <span class="section-title">Articles</span>
      <span style="font-size:11px;color:#555" id="art-count"></span>
    </div>
    <div id="art-list"></div>
  </div>
</div>
<script>
const data = [{"titre":"Travail le 1er mai : Yaël Braun-Pivet pointe la responsabilité du gouvernement après le recul de Sébastien Lecornu sur la proposition de loi","lien":"https://www.lemonde.fr/politique/article/2026/04/14/travail-le-1-mai-yael-braun-pivet-pointe-la-responsabilite-du-gouvernement-apres-le-recul-de-sebastien-lecornu-sur-la-proposition-de-loi_6679890_823448.html","source":"Le Monde - Politique","date":"2026-04-14","theme":"Macron","resume":"La présidente de l'Assemblée nationale critique publiquement l'exécutif pour son absence de dialogue préalable avec les syndicats sur un texte législatif controversé. Sébastien Lecornu a renoncé à convoquer la commission mixte paritaire face au rejet unanime des organisations syndicales, provoquant une rupture au sein du camp présidentiel sur la méthode employée.","importance":2},{"titre":"Présidentielle 2027 : face à la multiplication des candidatures, les sondages, naguère si décriés, semblent le seul arbitre","lien":"https://www.lemonde.fr/idees/article/2026/04/14/presidentielle-2027-face-a-la-multiplication-des-candidatures-les-sondages-naguere-si-decries-semblent-le-seul-arbitre_6679881_3232.html","source":"Le Monde - Politique","date":"2026-04-14","theme":"Droite","resume":"Le PS et LR, anciens partis dominants de la Ve République, traversent une profonde crise d'identité et ne parviennent pas à désigner de leader évident pour l'élection présidentielle. Le PS est particulièrement fragilisé par des conflits internes post-municipales et la difficulté à bâtir des alliances alors que la gauche ne rassemble qu'environ 30% des intentions de vote.","importance":2},{"titre":"Loi de simplification : les ZFE, cet arbre qui cache la forêt des reculs sur l'écologie","lien":"https://www.lesechos.fr/politique-societe/politique/loi-de-simplification-les-zfe-cet-arbre-qui-cache-la-foret-des-reculs-sur-lecologie-2226206","source":"Les Echos - politique & société","date":"2026-04-14","theme":"Institutionnel","resume":"Les parlementaires examinent mardi un projet de loi destiné à alléger les contraintes pour les entreprises. Le débat autour de l'abandon des zones à faibles émissions mobilise l'attention au détriment des nombreuses autres dispositions environnementales du texte.","importance":2},{"titre":"« Rien ne dit qu'on a touché le fond » : l'effondrement de la lecture chez les jeunes s'ancre et s'élargit","lien":"https://www.lesechos.fr/politique-societe/societe/il-faut-tout-faire-tout-de-suite-ce-rapport-qui-rappelle-ce-que-la-france-doit-accomplir-pour-reussir-sa-transition-bas-carbone-2226192","source":"Les Echos - politique & société","date":"2026-04-14","theme":"Institutionnel","resume":"Une étude du CNL révèle une aggravation préoccupante du désintérêt pour les livres parmi la jeunesse française. Le phénomène touche désormais des segments de population qui échappaient jusqu'à présent à cette tendance.","importance":2},{"titre":"1er-Mai : la peur du volcan","lien":"https://www.lesechos.fr/politique-societe/politique/1er-mai-la-peur-du-volcan-2226175","source":"Les Echos - politique & société","date":"2026-04-14","theme":"Institutionnel","resume":"L'échec de la commission mixte paritaire empêche l'entrée en vigueur cette année d'un texte législatif concernant le 1er-Mai. Cette situation illustre les dangers de la manipulation symbolique dans le débat politique, qui peut conduire à des impasses parlementaires.","importance":2},{"titre":"Environnement : la taxe sur les PFAS repoussée à la rentrée","lien":"https://www.lesechos.fr/politique-societe/societe/environnement-la-taxe-sur-les-pfas-repoussee-a-la-rentree-2226174","source":"Les Echos - politique & société","date":"2026-04-14","theme":"Institutionnel","resume":"La mise en place de la redevance imposée aux entreprises industrielles pour leurs émissions de substances chimiques persistantes dans l'environnement a été différée. Prévue initialement pour mars, cette mesure ne sera effective qu'après l'été.","importance":2},{"titre":"Une pompe à chaleur à 100 euros par mois, la proposition des électriciens au gouvernement","lien":"https://www.lesechos.fr/politique-societe/gouvernement/1er-mai-apres-la-reculade-de-lecornu-la-crainte-dune-zizanie-permanente-a-lassemblee-nationale-2226161","source":"Les Echos - politique & société","date":"2026-04-14","theme":"Macron","resume":"L'Union française de l'électricité suggère un système de location longue durée, étalé sur 15 à 20 ans, pour permettre aux ménages aux revenus limités d'accéder à ces équipements de chauffage dans le cadre de la stratégie d'électrification portée par l'exécutif. Ce dispositif repose sur des mensualités accessibles pour faciliter la transition énergétique des foyers.","importance":2},{"titre":"Parcoursup : les formations appelées à faire du « surbooking » pour réduire le stress des candidats","lien":"https://www.lesechos.fr/politique-societe/education/parcoursup-les-formations-appelees-a-faire-du-surbooking-pour-reduire-le-stress-des-candidats-2226129","source":"Les Echos - politique & société","date":"2026-04-14","theme":"Institutionnel","resume":"Le comité éthique et scientifique de Parcoursup constate que les établissements d'enseignement supérieur n'exploitent pas suffisamment les mécanismes disponibles pour diminuer les délais d'attente des lycéens. Le rapport préconise une meilleure utilisation de ces dispositifs afin d'améliorer l'expérience des candidats durant la phase d'admission.","importance":2},{"titre":"Entre prix de l'essence et 1er-Mai, Lecornu obligé de jouer l'équilibriste","lien":"https://www.lesechos.fr/politique-societe/gouvernement/entre-prix-de-lessence-et-1er-mai-lecornu-oblige-de-jouer-lequilibriste-2225964","source":"Les Echos - politique & société","date":"2026-04-14","theme":"Droite","resume":"Le chef du gouvernement souhaite intensifier la transition vers les véhicules électriques pour réduire la consommation d'hydrocarbures. Cependant, la flambée persistante des tarifs à la pompe et la controverse autour de la modification du statut du jour férié du 1er mai créent de nouvelles tensions politiques.","importance":2},{"titre":"Électrifier sans rallumer le climat","lien":"https://www.lesechos.fr/politique-societe/gouvernement/electrifier-sans-rallumer-le-climat-2225960","source":"Les Echos - politique & société","date":"2026-04-14","theme":"Macron","resume":"Le ministre Sébastien Lecornu présente son plan électrification en mettant l'accent sur l'indépendance énergétique et le pouvoir d'achat des Français. Dans un contexte budgétaire contraint, le gouvernement choisit délibérément d'écarter les arguments environnementaux jugés trop polémiques.","importance":2},{"titre":"VIDEO - Voyage dans la France floue : ces endroits que Google Maps nous cache","lien":"https://www.lesechos.fr/politique-societe/societe/video-ces-endroits-que-google-maps-vous-cache-2225959","source":"Les Echos - politique & société","date":"2026-04-14","theme":"Institutionnel","resume":"L'émission « Plan carte » révèle l'existence de zones géographiques délibérément rendues invisibles sur le service de cartographie de Google. L'enquête explore les raisons de cette censure cartographique et identifie les lieux concernés par ces restrictions d'affichage.","importance":1},{"titre":"Gaspillage d'argent public, dysfonctionnements préoccupants : pourquoi les grandes écoles et les universités sont en colère","lien":"https://www.lesechos.fr/politique-societe/education/gaspillage-dargent-public-dysfonctionnements-preoccupants-pourquoi-les-grandes-ecoles-et-les-universites-sont-en-colere-2225942","source":"Les Echos - politique & société","date":"2026-04-14","theme":"Institutionnel","resume":"L'examen parlementaire du projet de loi visant à encadrer l'enseignement supérieur privé a été reporté, ne se tenant pas comme prévu en mai. Les acteurs du secteur académique attendent désormais qu'une solution alternative soit mise en œuvre.","importance":2},{"titre":"Présidentielle 2027 : à Montreuil, les sociaux-démocrates tentent d'avancer sur le fond mais butent sur la forme","lien":"https://www.lesechos.fr/politique-societe/politique/presidentielle-2027-a-montreuil-les-sociaux-democrates-tentent-davancer-sur-le-fond-mais-butent-sur-le-fond-mais-butent-sur-la-forme-2225919","source":"Les Echos - politique & société","date":"2026-04-14","theme":"Institutionnel","resume":"Une rencontre samedi a rassemblé plusieurs figures de la gauche réformiste dont le leader de Place publique, le premier secrétaire du PS et le député socialiste ainsi que l'écologiste. Malgré l'interdiction affichée par les organisateurs d'évoquer les modalités de candidature pour l'élection suprême, cette question a fini par s'imposer dans les échanges.","importance":2},{"titre":"Municipales 2026 : comment le RN tente de s'implanter dans les « intercos »","lien":"https://www.lesechos.fr/politique-societe/politique/municipales-2026-comment-le-rn-tente-de-simplanter-dans-les-intercos-2225917","source":"Les Echos - politique & société","date":"2026-04-14","theme":"RN","resume":"Les scrutins intercommunaux, considérés comme un troisième tour après les municipales, constituent un terrain stratégique pour le parti de Marine Le Pen. Après sa première victoire historique à Menton, la formation d'extrême droite vise désormais à décrocher la présidence d'autres structures territoriales comme celle de Perpignan.","importance":2},{"titre":"Présidentielle 2027 : Yaël Braun-Pivet dénonce « un club de machos » et ne croit pas au « sauveur suprême qui règlerait tous les problèmes »","lien":"https://www.lefigaro.fr/politique/presidentielle-2027-yael-braun-pivet-denonce-un-club-de-machos-et-ne-croit-pas-au-sauveur-supreme-qui-reglerait-tous-les-problemes-20260414","source":"Le Figaro - Politique","date":"2026-04-14","theme":"Macron","resume":"La présidente de l'Assemblée nationale critique la multiplication des déclarations de candidature masculines pour l'élection présidentielle. Elle plaide pour une représentation féminine dans les discussions politiques, rappelant que les femmes constituent la moitié de la population française, et rejette l'idée d'une personnalité providentielle.","importance":2},{"titre":"Premier Conseil de Paris sous pression pour Emmanuel Grégoire ce mardi, en pleine tempête après les violences dans le périscolaire","lien":"https://www.lefigaro.fr/actualite-france/premier-conseil-de-paris-sous-pression-pour-emmanuel-gregoire-ce-mardi-en-pleine-tempete-apres-les-violences-dans-le-periscolaire-20260414","source":"Le Figaro - Politique","date":"2026-04-14","theme":"Institutionnel","resume":"Le nouveau maire de Paris affronte sa première séance du Conseil municipal dans un contexte tendu, marqué par des incidents survenus dans les structures d'accueil des enfants en dehors du temps scolaire. Cette première épreuve politique intervient alors que des controverses secouent la gestion des services municipaux destinés aux jeunes parisiens.","importance":2}];
const couleurs = {"LFI":{"hex":"#e53e3e"},"RN":{"hex":"#1a3a6e"},"Macron":{"hex":"#1D9E75"},"Droite":{"hex":"#BA7517"},"Institutionnel":{"hex":"#888780"}};
const couleursTexte = {"RN":"#4a7ac8"};

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Institutionnel') === filter);
  document.getElementById('art-count').textContent = filtered.length + ' résultats';
  document.getElementById('art-list').innerHTML = filtered.map(a => {
    const c = couleurs[a.theme] || { hex: '#888780' };
    const textColor = couleursTexte[a.theme] || c.hex;
    return `<a class="article-row" href="${a.lien}" target="_blank">
      <div class="theme-stripe" style="background:${c.hex}"></div>
      <div style="flex:1;min-width:0">
        <div class="art-title">${a.titre}</div>
        ${a.resume ? `<div class="art-resume">${a.resume}</div>` : ''}
        <div class="art-meta">
          <span class="src-pill">${a.source || ''}</span>
          <span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${c.hex}22;color:${textColor};border:1px solid ${c.hex}44;font-weight:700">${a.theme}</span>
          ${a.date ? `<span class="date-pill">${a.date}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const color = pill.dataset.color;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active');
    const c = p.dataset.color;
    p.style.borderColor = c === '#fff' ? '#ffffff44' : c + '44';
    p.style.background = c === '#fff' ? '#ffffff11' : c + '11';
    p.style.opacity = '.6';
  });
  pill.classList.add('active');
  pill.style.borderColor = color;
  pill.style.background = color === '#fff' ? '#ffffff22' : color + '22';
  pill.style.opacity = '1';
  render(pill.dataset.f);
});

const firstPill = document.querySelector('.pill');
if (firstPill) {
  firstPill.classList.add('active');
  firstPill.style.borderColor = firstPill.dataset.color;
  firstPill.style.background = firstPill.dataset.color + '22';
  firstPill.style.opacity = '1';
  render(firstPill.dataset.f);
}
</script>
