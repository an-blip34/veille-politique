<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Veille politique</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif}
.mc{background:#0a0a0f;color:#e8e8e8;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #222}
.title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.subtitle{font-size:12px;color:#666;margin-top:4px}
.top-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.metric{background:#12121a;border:1px solid #222;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.source-list{display:flex;flex-direction:column;gap:4px}
.source-item{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.source-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rep-row:last-child{margin-bottom:0}
.rep-name{font-size:12px;font-weight:600;width:110px;flex-shrink:0}
.rep-bar-wrap{flex:1;height:5px;background:#1e1e2a;border-radius:3px}
.rep-bar{height:5px;border-radius:3px}
.rep-count{font-size:11px;color:#555;width:24px;text-align:right;flex-shrink:0}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;opacity:.6}
.pill:hover{opacity:.85;transform:scale(1.05)}
.pill.active{opacity:1;transform:scale(1.08);border-width:2px}
.articles-section{background:#12121a;border:1px solid #222;border-radius:10px;padding:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-bottom:1px solid #1a1a24;border-radius:6px;text-decoration:none}
.article-row:hover{background:#16161e}
.article-row:last-child{border-bottom:none}
.theme-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px}
.art-title{font-size:13px;color:#ddd;line-height:1.4;font-weight:500}
.art-resume{font-size:11px;color:#888;margin-top:4px;line-height:1.4}
.art-meta{font-size:11px;margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.src-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#1e1e2a;color:#bbb;font-weight:700}
.date-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#0a1a2a;color:#38bdf8;font-weight:700}
</style>
</head>
<body>
<div class="mc">
  <div class="header">
    <div class="title">Veille politique</div>
    <div class="subtitle">dimanche 12 avril 2026 — 15 articles analysés</div>
  </div>
  <div class="top-metrics">
    <div class="metric">
      <div class="metric-label">Sources</div>
      <div class="source-list"><div class="source-item"><div class="source-dot"></div>Le Monde - Politique</div><div class="source-item"><div class="source-dot"></div>Les Echos - politique & société</div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Répartition thèmes</div>
      <div class="rep-row"><span class="rep-name" style="color:#1D9E75">Macron</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:67%;background:#1D9E75"></div></div><span class="rep-count">4</span></div><div class="rep-row"><span class="rep-name" style="color:#888780">Institutionnel</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:100%;background:#888780"></div></div><span class="rep-count">6</span></div><div class="rep-row"><span class="rep-name" style="color:#4a7ac8">RN</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:50%;background:#1a3a6e"></div></div><span class="rep-count">3</span></div><div class="rep-row"><span class="rep-name" style="color:#BA7517">Droite</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:33%;background:#BA7517"></div></div><span class="rep-count">2</span></div>
    </div>
  </div>
  <div class="filter-pills" id="pills"><div class="pill" data-f="Macron" data-color="#1D9E75" style="color:#1D9E75;border-color:#1D9E7544;background:#1D9E7511">Macron (4)</div><div class="pill" data-f="Institutionnel" data-color="#888780" style="color:#888780;border-color:#88878044;background:#88878011">Institutionnel (6)</div><div class="pill" data-f="RN" data-color="#4a7ac8" style="color:#4a7ac8;border-color:#4a7ac844;background:#1a3a6e11">RN (3)</div><div class="pill" data-f="Droite" data-color="#BA7517" style="color:#BA7517;border-color:#BA751744;background:#BA751711">Droite (2)</div><div class="pill" data-f="all" data-color="#fff" style="color:#fff;border-color:#ffffff44;background:#ffffff11">Tous (15)</div></div>
  <div class="articles-section">
    <div class="section-header">
      <span class="section-title">Articles</span>
      <span style="font-size:11px;color:#555" id="art-count"></span>
    </div>
    <div id="art-list"></div>
  </div>
</div>
<script>
const data = [{"titre":"Psychiatrie et risque terroriste : des praticiens dénoncent une instrumentalisation à des fins sécuritaires","lien":"https://www.lemonde.fr/societe/article/2026/04/12/psychiatrie-et-risque-terroriste-des-praticiens-denoncent-une-instrumentalisation-a-des-fins-securitaires_6679490_3224.html","source":"Le Monde - Politique","date":"2026-04-12","theme":"Macron","resume":"Le député Renaissance Charles Rodwell présente une proposition de loi accordant aux préfets le pouvoir d'ordonner l'examen et l'hospitalisation forcés de personnes radicalisées présentant des troubles mentaux. Cette initiative législative fait suite à plusieurs attaques meurtrières commises par des individus cumulant profils psychiatriques et radicalisés, notamment à Mulhouse en 2025 et Paris en 2023, mais suscite l'opposition du corps médical psychiatrique.","importance":2},{"titre":"Présidentielle 2027 : à Montreuil, les sociaux-démocrates tentent d'avancer sur le fond mais butent sur la forme","lien":"https://www.lesechos.fr/politique-societe/politique/presidentielle-2027-a-montreuil-les-sociaux-democrates-tentent-davancer-sur-le-fond-mais-butent-sur-la-forme-2225919","source":"Les Echos - politique & société","date":"2026-04-12","theme":"Institutionnel","resume":"Une rencontre rassemblant des figures de la gauche réformiste comme Glucksmann, Faure, Vallaud et Jadot s'est tenue samedi sous forme de table ronde. Malgré l'interdiction par les organisateurs d'évoquer les enjeux stratégiques pour l'élection présidentielle, cette question épineuse a inévitablement refait surface lors des échanges.","importance":2},{"titre":"Municipales 2026 : comment le RN tente de s'implanter dans les « intercos »","lien":"https://www.lesechos.fr/politique-societe/politique/municipales-2026-comment-le-rn-tente-de-simplanter-dans-les-intercos-2225917","source":"Les Echos - politique & société","date":"2026-04-12","theme":"RN","resume":"Après avoir conquis plusieurs mairies, le parti d'extrême droite cherche désormais à prendre le contrôle des structures intercommunales lors d'un scrutin qui se déroule après les élections locales. La formation a obtenu sa première victoire historique dans la métropole mentonnaise et vise également celle de Perpignan.","importance":2},{"titre":"Elections en Hongrie : le soutien ambigu de Marine Le Pen à Viktor Orbán","lien":"https://www.lesechos.fr/politique-societe/politique/elections-en-hongrie-le-soutien-ambigu-de-marine-le-pen-a-viktor-orban-2225906","source":"Les Echos - politique & société","date":"2026-04-12","theme":"RN","resume":"La présidente du RN effectue un déplacement dans la capitale hongroise pour apporter son appui au dirigeant ultraconservateur à quelques jours du scrutin. Cette initiative entre en tension avec la stratégie de dédiabolisation du mouvement qu'elle tente de mener.","importance":2},{"titre":"« Je veux être un candidat de rassemblement » : comment Dominique de Villepin intensifie sa campagne en vue de l'Élysée","lien":"https://www.lesechos.fr/politique-societe/politique/je-veux-etre-un-candidat-de-rassemblement-comment-dominique-de-villepin-intensifie-sa-campagne-en-vue-de-lelysee-2225897","source":"Les Echos - politique & société","date":"2026-04-12","theme":"Droite","resume":"L'ex-chef du gouvernement multiplie les déplacements à travers le territoire national dans le cadre de sa préparation à l'échéance électorale majeure. Il affirme ouvertement ses ambitions pour le scrutin suprême prévu l'année suivante, en adoptant une posture fédératrice.","importance":2},{"titre":"Électrification, chaudières à gaz, leasing électrique : face à la crise, Lecornu veut « changer d'échelle »","lien":"https://www.lesechos.fr/politique-societe/gouvernement/electrification-chaudieres-a-gaz-leasing-electrique-face-a-la-crise-lecornu-veut-changer-dechelle-2225856","source":"Les Echos - politique & société","date":"2026-04-12","theme":"Droite","resume":"Le chef du gouvernement s'est exprimé depuis Matignon pour dévoiler un plan d'action ambitieux visant à accélérer la transition énergétique du pays. Cette intervention intervient dans un contexte budgétaire tendu, où l'exécutif cherche à répondre aux préoccupations immédiates des Français.","importance":2},{"titre":"Insertion des jeunes : l'alerte des Écoles de la deuxième chance","lien":"https://www.lesechos.fr/politique-societe/politique/proces-du-financement-libyen-sarkozy-charge-toujours-plus-ses-anciens-collaborateurs-2225783","source":"Les Echos - politique & société","date":"2026-04-12","theme":"Institutionnel","resume":"Malgré l'accompagnement de 18.000 stagiaires sortis du système scolaire traditionnel l'année dernière, ce réseau fait face à des difficultés financières. La collectivité ligérienne a décidé d'interrompre son financement, jugeant les dépenses excessives par rapport aux standards habituels.","importance":2},{"titre":"VIDEO - Que contient la proposition de loi sur le 1er-Mai ?","lien":"https://www.lesechos.fr/politique-societe/politique/video-que-contient-la-proposition-de-loi-sur-le-1er-mai-2225722","source":"Les Echos - politique & société","date":"2026-04-12","theme":"Institutionnel","resume":"Les parlementaires ont renvoyé vendredi un texte législatif en commission mixte paritaire concernant les conditions d'ouverture des commerces lors de la fête du travail. L'enjeu porte notamment sur l'activité des boulangeries et des commerces de fleurs durant cette journée traditionnellement chômée.","importance":2},{"titre":"Guerre au Moyen-Orient : 20 millions d'euros en plus pour les agriculteurs","lien":"https://www.lesechos.fr/politique-societe/gouvernement/guerre-au-moyen-orient-20-millions-deuros-en-plus-pour-les-agriculteurs-2225592","source":"Les Echos - politique & société","date":"2026-04-12","theme":"Macron","resume":"L'exécutif a dévoilé jeudi une aide complémentaire destinée au monde agricole confronté à l'augmentation importante des tarifs énergétiques. Le principal syndicat agricole juge cette mesure largement en deçà des besoins réels du secteur.","importance":2},{"titre":"Record de réclamations auprès de la Défenseure des droits","lien":"https://www.lesechos.fr/politique-societe/societe/record-de-reclamations-aupres-de-la-defenseure-des-droits-2225450","source":"Les Echos - politique & société","date":"2026-04-12","theme":"Institutionnel","resume":"L'autorité indépendante a publié son rapport annuel ce jeudi, révélant une augmentation inédite du nombre de plaintes enregistrées durant l'année précédente. La transformation numérique des démarches administratives figure parmi les principales causes identifiées de cette croissance.","importance":2},{"titre":"Essence : pas de nouvelles mesures d'aide, annonce le ministre de l'Économie, qui mise sur la baisse des prix à la pompe","lien":"https://www.lesechos.fr/politique-societe/gouvernement/essence-pas-de-nouvelles-mesures-daide-annonce-le-ministre-de-leconomie-qui-mise-sur-la-baisse-des-prix-a-la-pompe-2225444","source":"Les Echos - politique & société","date":"2026-04-12","theme":"Macron","resume":"Le gouvernement renonce à déployer un dispositif de soutien pour les automobilistes malgré les attentes. Roland Lescure privilégie la répercussion naturelle de la diminution des cours du brut sur les tarifs des carburants, un mécanisme qu'il compare à un allègement fiscal sans impact budgétaire.","importance":2},{"titre":"Renaud Muselier s'apprête à quitter la région Paca et vise le Sénat","lien":"https://www.lesechos.fr/politique-societe/politique/renaud-muselier-sapprete-a-quitter-la-region-paca-et-vise-le-senat-2225355","source":"Les Echos - politique & société","date":"2026-04-12","theme":"Macron","resume":"Le responsable de l'exécutif régional de Provence-Alpes-Côte d'Azur, membre clé de Renaissance, envisage de poursuivre son engagement politique au niveau national en rejoignant la Chambre haute du Parlement. Cette transition lui permettrait de poursuivre depuis la capitale son action de résistance face aux mouvements radicaux.","importance":2},{"titre":"Sortie de l'Alsace du Grand Est : première étape franchie dans un processus très incertain","lien":"https://www.lesechos.fr/politique-societe/regions/sortie-de-lalsace-du-grand-est-premiere-etape-franchie-dans-un-processus-tres-incertain-2225354","source":"Les Echos - politique & société","date":"2026-04-12","theme":"Institutionnel","resume":"L'Assemblée nationale a adopté mercredi en première lecture un texte transpartisan visant à conférer un statut particulier à l'Alsace et à l'extraire de la région Grand Est. Malgré ce vote favorable, l'issue finale de cette réforme territoriale reste très incertaine.","importance":2},{"titre":"Présidentielle 2027 : la primaire de la gauche minée par les turpitudes internes du PS","lien":"https://www.lesechos.fr/politique-societe/politique/presidentielle-2027-la-primaire-de-la-gauche-minee-par-les-turpitudes-internes-du-ps-2225320","source":"Les Echos - politique & société","date":"2026-04-12","theme":"Institutionnel","resume":"Lors du bureau national de mardi soir, des tensions ont éclaté entre Olivier Faure et ses adversaires concernant l'organisation de l'élection présidentielle. Malgré ces divisions, les partisans d'une consultation ouverte poursuivent leurs efforts pour donner un nouvel élan à leur projet.","importance":2},{"titre":"RN-LFI : au cœur du piège populiste","lien":"https://www.lesechos.fr/politique-societe/politique/rn-lfi-au-coeur-du-piege-populiste-2225312","source":"Les Echos - politique & société","date":"2026-04-12","theme":"RN","resume":"Jean-François Copé (LR) et Jérôme Sainte-Marie (RN) débattent de la manière de critiquer les stratégies politiques fondées sur l'appel au peuple. L'échange explore la tension entre analyse critique de ces mouvements et risque d'être perçu comme condescendant envers les classes populaires.","importance":2}];
const couleurs = {"LFI":{"hex":"#e53e3e"},"RN":{"hex":"#1a3a6e"},"Macron":{"hex":"#1D9E75"},"Droite":{"hex":"#BA7517"},"Institutionnel":{"hex":"#888780"}};
const couleursTexte = {"RN":"#4a7ac8"};

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Institutionnel') === filter);
  document.getElementById('art-count').textContent = filtered.length + ' résultats';
  document.getElementById('art-list').innerHTML = filtered.map(a => {
    const c = couleurs[a.theme] || { hex: '#888780' };
    const textColor = couleursTexte[a.theme] || c.hex;
    return `<a class="article-row" href="${a.lien}" target="_blank">
      <div class="theme-stripe" style="background:${c.hex}"></div>
      <div style="flex:1;min-width:0">
        <div class="art-title">${a.titre}</div>
        ${a.resume ? `<div class="art-resume">${a.resume}</div>` : ''}
        <div class="art-meta">
          <span class="src-pill">${a.source || ''}</span>
          <span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${c.hex}22;color:${textColor};border:1px solid ${c.hex}44;font-weight:700">${a.theme}</span>
          ${a.date ? `<span class="date-pill">${a.date}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const color = pill.dataset.color;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active');
    const c = p.dataset.color;
    p.style.borderColor = c === '#fff' ? '#ffffff44' : c + '44';
    p.style.background = c === '#fff' ? '#ffffff11' : c + '11';
    p.style.opacity = '.6';
  });
  pill.classList.add('active');
  pill.style.borderColor = color;
  pill.style.background = color === '#fff' ? '#ffffff22' : color + '22';
  pill.style.opacity = '1';
  render(pill.dataset.f);
});

const firstPill = document.querySelector('.pill');
if (firstPill) {
  firstPill.classList.add('active');
  firstPill.style.borderColor = firstPill.dataset.color;
  firstPill.style.background = firstPill.dataset.color + '22';
  firstPill.style.opacity = '1';
  render(firstPill.dataset.f);
}
</script>
</body>
</html>
