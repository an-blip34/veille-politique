<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Veille politique</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif}
.mc{background:#0a0a0f;color:#e8e8e8;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #222}
.title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.subtitle{font-size:12px;color:#666;margin-top:4px}
.top-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.metric{background:#12121a;border:1px solid #222;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.source-list{display:flex;flex-direction:column;gap:4px}
.source-item{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.source-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rep-row:last-child{margin-bottom:0}
.rep-name{font-size:12px;font-weight:600;width:110px;flex-shrink:0}
.rep-bar-wrap{flex:1;height:5px;background:#1e1e2a;border-radius:3px}
.rep-bar{height:5px;border-radius:3px}
.rep-count{font-size:11px;color:#555;width:24px;text-align:right;flex-shrink:0}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;opacity:.6}
.pill:hover{opacity:.85;transform:scale(1.05)}
.pill.active{opacity:1;transform:scale(1.08);border-width:2px}
.articles-section{background:#12121a;border:1px solid #222;border-radius:10px;padding:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-bottom:1px solid #1a1a24;border-radius:6px;text-decoration:none}
.article-row:hover{background:#16161e}
.article-row:last-child{border-bottom:none}
.theme-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px}
.art-title{font-size:13px;color:#ddd;line-height:1.4;font-weight:500}
.art-meta{font-size:11px;color:#555;margin-top:3px;display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.art-resume{font-size:11px;color:#888;margin-top:2px;line-height:1.4}
.src-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;background:#1e1e2a;color:#666}
.date-pill{font-size:10px;color:#444;padding:2px 7px;border-radius:10px;background:#1a1a24}
</style>
</head>
<body>
<div class="mc">
  <div class="header">
    <div class="title">Veille politique</div>
    <div class="subtitle">samedi 4 avril 2026 — 7 articles analysés</div>
  </div>
  <div class="top-metrics">
    <div class="metric">
      <div class="metric-label">Sources</div>
      <div class="source-list"><div class="source-item"><div class="source-dot"></div>Valeurs Actuelles - Politique</div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Répartition thèmes</div>
      <div class="rep-row"><span class="rep-name" style="color:#378ADD">RN</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:33%;background:#378ADD"></div></div><span class="rep-count">1</span></div><div class="rep-row"><span class="rep-name" style="color:#7F77DD">LFI</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:100%;background:#7F77DD"></div></div><span class="rep-count">3</span></div><div class="rep-row"><span class="rep-name" style="color:#888780">Institutionnel</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:33%;background:#888780"></div></div><span class="rep-count">1</span></div><div class="rep-row"><span class="rep-name" style="color:#BA7517">Droite</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:67%;background:#BA7517"></div></div><span class="rep-count">2</span></div>
    </div>
  </div>
  <div class="filter-pills" id="pills"><div class="pill" data-f="RN" data-color="#378ADD" style="color:#378ADD;border-color:#378ADD44;background:#378ADD11">RN (1)</div><div class="pill" data-f="LFI" data-color="#7F77DD" style="color:#7F77DD;border-color:#7F77DD44;background:#7F77DD11">LFI (3)</div><div class="pill" data-f="Institutionnel" data-color="#888780" style="color:#888780;border-color:#88878044;background:#88878011">Institutionnel (1)</div><div class="pill" data-f="Droite" data-color="#BA7517" style="color:#BA7517;border-color:#BA751744;background:#BA751711">Droite (2)</div><div class="pill" data-f="all" data-color="#fff" style="color:#fff;border-color:#ffffff44;background:#ffffff11">Tous (7)</div></div>
  <div class="articles-section">
    <div class="section-header">
      <span class="section-title">Articles</span>
      <span style="font-size:11px;color:#555" id="art-count"></span>
    </div>
    <div id="art-list"></div>
  </div>
</div>
<script>
const data = [{"titre":"Bretagne : une élue RN rappelée à l'ordre après l'affichage d'un autocollant « Espoir et salut de la France »","lien":"https://www.valeursactuelles.com/regions/bretagne/nd/na/politique/bretagne-une-elue-rn-rappelee-a-lordre-apres-laffichage-dun-autocollant-espoir-et-salut-de-la-france","source":"Valeurs Actuelles - Politique","date":"2026-04-04","theme":"RN","resume":"Une élue RN bretonne sanctionnée pour affichage d'un autocollant controversé.","importance":1},{"titre":"Quand Bally Bagayoko intervenait sur CNews en 2023, bien avant d'appeler à sa fermeture","lien":"https://www.valeursactuelles.com/politique/quand-bally-bagayoko-intervenait-sur-cnews-en-2023-bien-avant-dappeler-a-sa-fermeture","source":"Valeurs Actuelles - Politique","date":"2026-04-04","theme":"LFI","resume":"Bally Bagayoko apparaissait sur CNews en 2023 avant de demander sa fermeture.","importance":2},{"titre":"Corse : avis de tempête sur le « Siméonisme », un ex-député accusé publiquement de corruption sexuelle","lien":"https://www.valeursactuelles.com/clubvaleurs/regions/corse/haute-corse/bastia/politique/corse-avis-de-tempete-sur-le-simeonisme-un-ex-depute-accuse-publiquement-de-corruption-sexuelle","source":"Valeurs Actuelles - Politique","date":"2026-04-04","theme":"Institutionnel","resume":"Un ancien député corse est accusé publiquement de corruption sexuelle.","importance":2},{"titre":"Les absolutions de Vincent Bolloré","lien":"https://www.valeursactuelles.com/clubvaleurs/politique/les-absolutions-de-vincent-bollore","source":"Valeurs Actuelles - Politique","date":"2026-04-03","theme":"Droite","resume":"Vincent Bolloré bénéficie de décisions judiciaires favorables dans plusieurs affaires.","importance":2},{"titre":"« Parti séditieux » : Bruno Retailleau annonce la création d'un « observatoire des villes LFI »","lien":"https://www.valeursactuelles.com/politique/parti-seditieux-bruno-retailleau-annonce-la-creation-dun-observatoire-des-villes-lfi","source":"Valeurs Actuelles - Politique","date":"2026-04-03","theme":"LFI","resume":"Bruno Retailleau crée un observatoire pour surveiller les municipalités dirigées par LFI.","importance":2},{"titre":"Perpignan : comment les droites s'unissent à l'échelle municipale","lien":"https://www.valeursactuelles.com/clubvaleurs/regions/occitanie/pyrenees-orientales/perpignan/politique/perpignan-comment-les-droites-sunissent-a-lechelle-municipale","source":"Valeurs Actuelles - Politique","date":"2026-04-03","theme":"Droite","resume":"Les droites s'allient au niveau municipal à Perpignan pour gouverner ensemble.","importance":2},{"titre":"Après sa garde à vue pour « apologie du terrorisme », Rima Hassan de nouveau convoquée par la police dans une autre affaire","lien":"https://www.valeursactuelles.com/politique/apres-sa-garde-a-vue-pour-apologie-du-terrorisme-rima-hassan-de-nouveau-convoquee-par-la-police-dans-une-autre-affaire","source":"Valeurs Actuelles - Politique","date":"2026-04-03","theme":"LFI","resume":"Rima Hassan à nouveau convoquée après sa garde à vue pour apologie du terrorisme.","importance":2}];
const couleurs = {"LFI":{"hex":"#7F77DD"},"RN":{"hex":"#378ADD"},"Macron":{"hex":"#1D9E75"},"Droite":{"hex":"#BA7517"},"Institutionnel":{"hex":"#888780"}};

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Institutionnel') === filter);
  document.getElementById('art-count').textContent = filtered.length + ' résultats';
  document.getElementById('art-list').innerHTML = filtered.map(a => {
    const c = couleurs[a.theme] || { hex: '#888780' };
    return `<a class="article-row" href="${a.lien}" target="_blank">
      <div class="theme-stripe" style="background:${c.hex}"></div>
      <div style="flex:1;min-width:0">
        <div class="art-title">${a.titre}</div>
        <div class="art-resume">${a.resume || ''}</div>
        <div class="art-meta">
          <span class="src-pill">${a.source || ''}</span>
          <span style="color:${c.hex};font-size:10px">${a.theme}</span>
          ${a.date ? `<span class="date-pill">${a.date}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const color = pill.dataset.color;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active');
    const c = p.dataset.color;
    p.style.borderColor = c === '#fff' ? '#ffffff44' : c + '44';
    p.style.background = c === '#fff' ? '#ffffff11' : c + '11';
    p.style.opacity = '.6';
  });
  pill.classList.add('active');
  pill.style.borderColor = color;
  pill.style.background = color === '#fff' ? '#ffffff22' : color + '22';
  pill.style.opacity = '1';
  render(pill.dataset.f);
});

const firstPill = document.querySelector('.pill');
if (firstPill) {
  firstPill.classList.add('active');
  firstPill.style.borderColor = firstPill.dataset.color;
  firstPill.style.background = firstPill.dataset.color + '22';
  firstPill.style.opacity = '1';
  render(firstPill.dataset.f);
}
</script>
</body>
</html>
