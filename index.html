<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif}
.mc{background:#0a0a0f;color:#e8e8e8;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #222}
.title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.subtitle{font-size:12px;color:#666;margin-top:4px}
.top-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.metric{background:#12121a;border:1px solid #222;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.source-list{display:flex;flex-direction:column;gap:4px}
.source-item{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.source-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rep-row:last-child{margin-bottom:0}
.rep-name{font-size:12px;font-weight:600;width:110px;flex-shrink:0}
.rep-bar-wrap{flex:1;height:5px;background:#1e1e2a;border-radius:3px}
.rep-bar{height:5px;border-radius:3px}
.rep-count{font-size:11px;color:#555;width:24px;text-align:right;flex-shrink:0}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;opacity:.6}
.pill:hover{opacity:.85;transform:scale(1.05)}
.pill.active{opacity:1;transform:scale(1.08);border-width:2px}
.articles-section{background:#12121a;border:1px solid #222;border-radius:10px;padding:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-bottom:1px solid #1a1a24;border-radius:6px;text-decoration:none}
.article-row:hover{background:#16161e}
.article-row:last-child{border-bottom:none}
.theme-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px}
.art-title{font-size:13px;color:#ddd;line-height:1.4;font-weight:500}
.art-resume{font-size:11px;color:#888;margin-top:4px;line-height:1.4}
.art-meta{font-size:11px;margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.src-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#1e1e2a;color:#bbb;font-weight:700}
.date-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#0a1a2a;color:#38bdf8;font-weight:700}
</style>
</head>

<script>
const data = [{"titre":"S'opposer à la proposition de loi Yadan est à la fois nécessaire et insuffisant","lien":"https://www.lemonde.fr/idees/article/2026/04/16/s-opposer-a-la-proposition-de-loi-yadan-est-a-la-fois-necessaire-et-insuffisant_6680477_3232.html","source":"Le Monde - Politique","date":"2026-04-16","theme":"Macron","resume":"Le chercheur Jonas Pardo critique dans une tribune la proposition de loi de la députée EPR Caroline Yadan sur la « provocation indirecte » à l'apologie du terrorisme, jugée floue et instrumentalisable contre les critiques d'Israël. Il estime que cette judiciarisation accroît la polarisation du débat public et nuit ainsi à la lutte contre l'antisémitisme, tout en appelant la gauche à combattre certaines dérives.","importance":2},{"titre":"Budget 2027 : François Hollande prône un 49.3 et le début rapide des discussions","lien":"https://www.lemonde.fr/politique/article/2026/04/16/budget-2027-francois-hollande-prone-un-49-3-et-le-debut-rapide-des-discussions_6680476_823448.html","source":"Le Monde - Politique","date":"2026-04-16","theme":"Institutionnel","resume":"L'ancien chef de l'État socialiste recommande l'ouverture immédiate de négociations avec le PS et les groupes d'opposition favorables à la stabilité nationale. Il suggère l'utilisation de l'article constitutionnel permettant l'adoption sans vote parlementaire après des échanges limités, afin de prévenir toute motion de défiance à un an de l'élection présidentielle et d'empêcher les postures électoralistes.","importance":2},{"titre":"Le Medef se défend de tout rapprochement avec le RN","lien":"https://www.lemonde.fr/politique/article/2026/04/16/le-medef-se-defend-de-tout-rapprochement-avec-le-rn_6680474_823448.html","source":"Le Monde - Politique","date":"2026-04-16","theme":"RN","resume":"L'organisation patronale réfute toute alliance ou dialogue privilégié avec le parti d'extrême droite. Cette mise au point intervient dans un contexte de polémiques sur les relations entre le monde économique et les formations politiques.","importance":2},{"titre":"Grasset : l'intégralité de la lettre de départ et la liste des 115 auteurs signataires qui quittent la maison d'édition","lien":"https://www.lemonde.fr/economie/article/2026/04/16/grasset-l-integralite-de-la-lettre-de-depart-et-la-liste-des-115-auteurs-signataires-qui-quittent-la-maison-d-edition_6680470_3234.html","source":"Le Monde - Politique","date":"2026-04-16","theme":"Institutionnel","resume":"Un mouvement collectif d'écrivains décide de rompre leurs contrats avec leur éditeur historique. La publication intégrale du courrier de rupture accompagne l'identité des nombreux signataires de cette action inédite dans le secteur de l'édition française.","importance":2},{"titre":"Antisémitisme : contestée, la proposition de loi Yadan arrive à l'Assemblée","lien":"https://www.lemonde.fr/politique/article/2026/04/16/antisemitisme-contestee-la-proposition-de-loi-yadan-arrive-a-l-assemblee_6680467_823448.html","source":"Le Monde - Politique","date":"2026-04-16","theme":"Institutionnel","resume":"Un texte législatif porté par Yadan fait l'objet de débats parlementaires. Cette initiative suscite des oppositions avant même son examen par les députés.","importance":2},{"titre":"Le RN n'est ni de gauche ni de gauche, son image sociale est largement factice","lien":"https://www.lemonde.fr/idees/article/2026/04/16/le-rn-n-est-ni-de-gauche-ni-de-gauche-son-image-sociale-est-largement-factice_6680466_3232.html","source":"Le Monde - Politique","date":"2026-04-16","theme":"RN","resume":"Le positionnement du Rassemblement National comme parti défenseur des classes populaires serait une construction artificielle. L'analyse démonte la stratégie de communication du parti d'extrême droite qui tente de se présenter sous un jour progressiste.","importance":2},{"titre":"Grasset après le limogeage d'Olivier Nora : la prestigieuse maison d'édition confrontée à l'hémorragie de ses auteurs","lien":"https://www.lemonde.fr/economie/article/2026/04/16/grasset-apres-le-limogeage-d-olivier-nora-la-prestigieuse-maison-d-edition-confrontee-a-l-hemorragie-de-ses-auteurs_6680457_3234.html","source":"Le Monde - Politique","date":"2026-04-16","theme":"Institutionnel","resume":"La célèbre maison d'édition française fait face à un exode massif de ses écrivains suite au départ de son directeur. Cette crise managériale fragilise l'une des institutions culturelles françaises les plus renommées.","importance":2},{"titre":"Lutte antiterroriste : l'Assemblée nationale adopte une mesure visant les sorties de personnes considérées comme radicalisées en prison","lien":"https://www.lemonde.fr/politique/article/2026/04/16/lutte-antiterroriste-l-assemblee-nationale-adopte-une-mesure-visant-les-sorties-de-personnes-considerees-comme-radicalisees-en-prison_6680351_823448.html","source":"Le Monde - Politique","date":"2026-04-16","theme":"Institutionnel","resume":"Les députés ont validé un dispositif encadrant les conditions de libération des détenus identifiés comme présentant un profil d'extrémisme religieux dans les établissements pénitentiaires.","importance":2},{"titre":"Les rencontres des patrons avec le RN se multiplient à un an de la présidentielle 2027","lien":"https://www.lesechos.fr/politique-societe/politique/les-rencontres-des-patrons-avec-le-rn-se-multiplient-a-un-an-de-la-presidentielle-2027-2226681","source":"Les Echos - politique & société","date":"2026-04-16","theme":"RN","resume":"Après un dîner réunissant Marine Le Pen et une quinzaine de dirigeants de grandes entreprises françaises, Jordan Bardella sera reçu par l'organisation patronale principale. Ces contacts suscitent des discussions au sein du monde économique sur la pertinence de dialoguer avec cette formation politique.","importance":2},{"titre":"Enseignement supérieur privé : le projet de loi finalement examiné le 1er juin","lien":"https://www.lesechos.fr/politique-societe/education/enseignement-superieur-prive-le-projet-de-loi-finalement-examine-le-1er-juin-2226661","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Institutionnel","resume":"La Conférence des présidents du Sénat a fixé au calendrier parlementaire l'examen d'un texte visant à encadrer le secteur de l'enseignement supérieur privé. Cette inscription intervient après plusieurs ajournements successifs et diverses péripéties procédurales.","importance":2},{"titre":"Présidentielle 2027 : Attal, Philippe and co, qui pour sortir la tête de l'eau ?","lien":"https://www.lesechos.fr/politique-societe/politique/presidentielle-2027-attal-philippe-and-co-qui-pour-sortir-la-tete-de-leau-2226652","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Macron","resume":"Au sein de la majorité présidentielle, plusieurs prétendants se disputent actuellement l'investiture sans se heurter frontalement. La multiplication des candidatures offre une protection temporaire contre les critiques, mais l'union autour d'un seul nom s'avère inévitable pour espérer peser dans l'élection.","importance":2},{"titre":"Présidentielle 2027 : avec son tour de France, Édouard Philippe à contre-courant de Gabriel Attal","lien":"https://www.lesechos.fr/politique-societe/politique/presidentielle-2027-avec-son-tour-de-france-edouard-philippe-a-contre-courant-de-gabriel-attal-2226623","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Macron","resume":"Les deux anciens chefs de gouvernement du président de la République adoptent des approches contrastées dans leur préparation de la course à l'Élysée. Leurs méthodes de campagne divergent alors qu'ils sont tous deux en lice pour succéder à Emmanuel Macron.","importance":2},{"titre":"Qualité de l'air : la pollution s'est aggravée en Île-de-France","lien":"https://www.lesechos.fr/politique-societe/societe/qualite-de-lair-la-pollution-sest-aggravee-en-ile-de-france-2226597","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Institutionnel","resume":"Les données d'Airparif révèlent une détérioration de la qualité atmosphérique en 2025 dans la région capitale. Après vingt ans d'amélioration continue, la tendance positive marque un ralentissement inquiétant durant la période récente.","importance":2},{"titre":"Prix de l'essence : la lettre au vitriol des distributeurs contre le plafonnement des marges évoqué par Matignon","lien":"https://www.lesechos.fr/politique-societe/gouvernement/prix-de-lessence-la-lettre-au-vitriol-des-distributeurs-contre-le-plafonnement-des-marges-evoque-par-matignon-2226564","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Macron","resume":"L'exécutif travaille sur un dispositif réglementaire limitant les bénéfices des stations-service. Les professionnels du secteur demandent l'abandon du projet et proposent plutôt d'arrêter temporairement le mécanisme des CEE, une solution que les services du Premier ministre refusent catégoriquement.","importance":2},{"titre":"Parc des Princes : Emmanuel Grégoire autorisé à renouer le dialogue avec le PSG","lien":"https://www.lesechos.fr/politique-societe/regions/parc-des-princes-emmanuel-gregoire-autorise-a-renouer-le-dialogue-avec-le-psg-2226427","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Institutionnel","resume":"Le Conseil de Paris a mandaté mardi le maire pour entamer des négociations avec le club de football parisien concernant son avenir dans l'enceinte sportive. Deux propositions sont envisagées : une cession définitive de l'infrastructure ou l'établissement d'un contrat de location de très longue durée.","importance":2},{"titre":"Le gouvernement obtient enfin l'adoption de la loi simplification mais sans sauver les ZFE","lien":"https://www.lesechos.fr/politique-societe/politique/le-gouvernement-obtient-enfin-ladoption-de-la-loi-simplification-mais-sans-sauver-les-zfe-2226417","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Institutionnel","resume":"L'exécutif a fait adopter son texte visant à alléger les contraintes administratives pour les sociétés, incluant un assouplissement du principe de zéro artificialisation nette qui fait débat. La disposition phare supprimant les zones à faibles émissions risque d'être censurée par les Sages pour non-conformité procédurale.","importance":2},{"titre":"Présidentielle 2027 : éteindre les écrans pour un débat éclairé","lien":"https://www.lesechos.fr/politique-societe/societe/presidentielle-2027-eteindre-les-ecrans-pour-un-debat-eclaire-2226413","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Institutionnel","resume":"La diminution des pratiques de lecture touche désormais toutes les générations, avec une situation particulièrement préoccupante pour la jeunesse. Cette problématique constitue un défi sanitaire mais également démocratique à l'approche de l'échéance électorale présidentielle.","importance":2},{"titre":"Bac, Parcoursup… : une piste pour éviter les débats sans fin et les pressions autour des notes","lien":"https://www.lesechos.fr/politique-societe/education/bac-parcoursup-une-piste-pour-eviter-les-debats-sans-fin-et-les-pressions-autour-des-notes-2226412","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Institutionnel","resume":"Le Comité éthique et scientifique de Parcoursup propose dans son rapport de lundi d'étendre le système d'évaluation du baccalauréat professionnel aux filières générales et technologiques. Cette mesure vise à corriger les inégalités de traitement entre candidats selon leur établissement scolaire.","importance":2},{"titre":"Recul sur le 1er-Mai : Sébastien Lecornu sous le feu des critiques","lien":"https://www.lesechos.fr/politique-societe/gouvernement/recul-sur-le-1er-mai-sebastien-lecornu-sous-le-feu-des-critiques-2226405","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Macron","resume":"Le chef du gouvernement fait face à une fronde au sein de sa propre majorité après avoir renoncé à son projet d'autoriser le travail durant la fête des travailleurs. En difficulté pour justifier ce revirement, il peine à convaincre et à apaiser les tensions internes.","importance":2},{"titre":"Guerre au Moyen-Orient : le gouvernement revoit à la baisse sa prévision de croissance pour 2026, le déficit toujours prévu à 5 %","lien":"https://www.lesechos.fr/politique-societe/gouvernement/guerre-au-moyen-orient-la-france-revoit-a-la-baisse-sa-prevision-de-croissance-pour-2026-le-deficit-toujours-prevu-a-5-2226383","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Macron","resume":"Le ministère de l'Économie ajuste ses projections économiques mardi, tablant sur une expansion de l'activité limitée à 0,9 % cette année et 1 % l'an prochain, avec l'hypothèse d'une détente des cours pétroliers d'ici l'été. L'objectif de ramener les comptes publics sous le seuil européen reste fixé à 2029.","importance":2},{"titre":"Cantines, crèches, piscines, ramassage des ordures… Les collectivités locales invitées à tailler dans leur « maquis » tarifaire","lien":"https://www.lesechos.fr/politique-societe/regions/les-collectivites-locales-invitees-a-tailler-dans-le-maquis-tarifaire-de-leurs-services-publics-2226255","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Institutionnel","resume":"La Cour des comptes pointe une gestion défaillante de la politique tarifaire par les administrations territoriales, qui accordent une vigilance variable à ce poste stratégique. Cette situation intervient dans un contexte où les implications budgétaires représentent des montants considérables pour les finances publiques locales.","importance":2},{"titre":"Loi de simplification : les ZFE, cet arbre qui cache la forêt des reculs sur l'écologie","lien":"https://www.lesechos.fr/politique-societe/politique/loi-de-simplification-les-zfe-cet-arbre-qui-cache-la-foret-des-reculs-sur-lecologie-2226206","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Institutionnel","resume":"L'Assemblée nationale examine mardi un projet de loi initialement destiné à alléger les contraintes économiques. Ce texte législatif a évolué en compilation de dispositions diverses, où l'abolition des zones à faibles émissions mobilise l'attention médiatique au détriment d'autres dispositions environnementales controversées.","importance":2},{"titre":"L'effondrement de la lecture chez les jeunes s'ancre et s'élargit","lien":"https://www.lesechos.fr/politique-societe/societe/il-faut-tout-faire-tout-de-suite-ce-rapport-qui-rappelle-ce-que-la-france-doit-accomplir-pour-reussir-sa-transition-bas-carbone-2226192","source":"Les Echos - politique & société","date":"2026-04-16","theme":"Institutionnel","resume":"Une étude du CNL révèle une aggravation du phénomène de désengagement vis-à-vis des livres parmi la population juvénile. Des segments démographiques qui résistaient encore à cette tendance sont maintenant touchés par ce recul des pratiques littéraires.","importance":2},{"titre":"Emmanuel Macron reçoit 500 maires à l'Élysée ce jeudi pour les «mobiliser», un mois après les élections municipales","lien":"https://www.lefigaro.fr/politique/emmanuel-macron-recoit-500-maires-a-l-elysee-ce-jeudi-pour-les-mobiliser-un-mois-apres-les-elections-municipales-20260416","source":"Le Figaro - Politique","date":"2026-04-16","theme":"Macron","resume":"Le président organise une réception rassemblant des édiles de toutes sensibilités politiques et de tous types de territoires pour valoriser leur engagement républicain. L'Élysée inscrit cette initiative dans une démarche de défense démocratique, face aux attaques dont font l'objet ces élus locaux considérés comme la trame vivante de la République.","importance":2}];
const couleurs = {"LFI":{"hex":"#e53e3e"},"RN":{"hex":"#1a3a6e"},"Macron":{"hex":"#1D9E75"},"Droite":{"hex":"#BA7517"},"Institutionnel":{"hex":"#888780"}};
const couleursTexte = {"RN":"#4a7ac8"};

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Institutionnel') === filter);
  document.getElementById('art-count').textContent = filtered.length + ' résultats';
  document.getElementById('art-list').innerHTML = filtered.map(a => {
    const c = couleurs[a.theme] || { hex: '#888780' };
    const textColor = couleursTexte[a.theme] || c.hex;
    return `<a class="article-row" href="${a.lien}" target="_blank">
      <div class="theme-stripe" style="background:${c.hex}"></div>
      <div style="flex:1;min-width:0">
        <div class="art-title">${a.titre}</div>
        ${a.resume ? `<div class="art-resume">${a.resume}</div>` : ''}
        <div class="art-meta">
          <span class="src-pill">${a.source || ''}</span>
          <span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${c.hex}22;color:${textColor};border:1px solid ${c.hex}44;font-weight:700">${a.theme}</span>
          ${a.date ? `<span class="date-pill">${a.date}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const color = pill.dataset.color;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active');
    const c = p.dataset.color;
    p.style.borderColor = c === '#fff' ? '#ffffff44' : c + '44';
    p.style.background = c === '#fff' ? '#ffffff11' : c + '11';
    p.style.opacity = '.6';
  });
  pill.classList.add('active');
  pill.style.borderColor = color;
  pill.style.background = color === '#fff' ? '#ffffff22' : color + '22';
  pill.style.opacity = '1';
  render(pill.dataset.f);
});

const firstPill = document.querySelector('.pill');
if (firstPill) {
  firstPill.classList.add('active');
  firstPill.style.borderColor = firstPill.dataset.color;
  firstPill.style.background = firstPill.dataset.color + '22';
  firstPill.style.opacity = '1';
  render(firstPill.dataset.f);
}
</script>
</body>
</html>
