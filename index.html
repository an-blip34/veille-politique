<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Veille politique</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif}
.mc{background:#0a0a0f;color:#e8e8e8;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #222}
.title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.subtitle{font-size:12px;color:#666;margin-top:4px}
.top-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.metric{background:#12121a;border:1px solid #222;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.source-list{display:flex;flex-direction:column;gap:4px}
.source-item{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.source-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rep-row:last-child{margin-bottom:0}
.rep-name{font-size:12px;font-weight:600;width:110px;flex-shrink:0}
.rep-bar-wrap{flex:1;height:5px;background:#1e1e2a;border-radius:3px}
.rep-bar{height:5px;border-radius:3px}
.rep-count{font-size:11px;color:#555;width:24px;text-align:right;flex-shrink:0}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;opacity:.6}
.pill:hover{opacity:.85;transform:scale(1.05)}
.pill.active{opacity:1;transform:scale(1.08);border-width:2px}
.articles-section{background:#12121a;border:1px solid #222;border-radius:10px;padding:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-bottom:1px solid #1a1a24;border-radius:6px;text-decoration:none}
.article-row:hover{background:#16161e}
.article-row:last-child{border-bottom:none}
.theme-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px}
.art-title{font-size:13px;color:#ddd;line-height:1.4;font-weight:500}
.art-resume{font-size:11px;color:#888;margin-top:4px;line-height:1.4}
.art-meta{font-size:11px;margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.src-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#1e1e2a;color:#bbb;font-weight:700}
.date-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#0a1a2a;color:#38bdf8;font-weight:700}
</style>
</head>
<body>
<div class="mc">
  <div class="header">
    <div class="title">Veille politique</div>
    <div class="subtitle">samedi 18 avril 2026 — 19 articles analysés</div>
  </div>
  <div class="top-metrics">
    <div class="metric">
      <div class="metric-label">Sources</div>
      <div class="source-list"><div class="source-item"><div class="source-dot"></div>Le Monde - Politique</div><div class="source-item"><div class="source-dot"></div>Les Echos - politique & société</div><div class="source-item"><div class="source-dot"></div>Le Figaro - Politique</div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Répartition thèmes</div>
      <div class="rep-row"><span class="rep-name" style="color:#BA7517">Droite</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:38%;background:#BA7517"></div></div><span class="rep-count">3</span></div><div class="rep-row"><span class="rep-name" style="color:#1D9E75">Macron</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:88%;background:#1D9E75"></div></div><span class="rep-count">7</span></div><div class="rep-row"><span class="rep-name" style="color:#888780">Institutionnel</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:100%;background:#888780"></div></div><span class="rep-count">8</span></div><div class="rep-row"><span class="rep-name" style="color:#4a7ac8">RN</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:13%;background:#1a3a6e"></div></div><span class="rep-count">1</span></div>
    </div>
  </div>
  <div class="filter-pills" id="pills"><div class="pill" data-f="Droite" data-color="#BA7517" style="color:#BA7517;border-color:#BA751744;background:#BA751711">Droite (3)</div><div class="pill" data-f="Macron" data-color="#1D9E75" style="color:#1D9E75;border-color:#1D9E7544;background:#1D9E7511">Macron (7)</div><div class="pill" data-f="Institutionnel" data-color="#888780" style="color:#888780;border-color:#88878044;background:#88878011">Institutionnel (8)</div><div class="pill" data-f="RN" data-color="#4a7ac8" style="color:#4a7ac8;border-color:#4a7ac844;background:#1a3a6e11">RN (1)</div><div class="pill" data-f="all" data-color="#fff" style="color:#fff;border-color:#ffffff44;background:#ffffff11">Tous (19)</div></div>
  <div class="articles-section">
    <div class="section-header">
      <span class="section-title">Articles</span>
      <span style="font-size:11px;color:#555" id="art-count"></span>
    </div>
    <div id="art-list"></div>
  </div>
</div>
<script>
const data = [{"titre":"Présidentielle 2027 : les Républicains votent ce week-end pour choisir le mode de désignation de leur candidat","lien":"https://www.lemonde.fr/politique/article/2026/04/18/presidentielle-2027-les-republicains-votent-ce-week-end-pour-choisir-le-mode-de-designation-de-leur-candidat_6681116_823448.html","source":"Le Monde - Politique","date":"2026-04-18","theme":"Droite","resume":"Les militants de LR se prononcent sur trois modalités de sélection : la nomination automatique du chef de parti Bruno Retailleau, une primaire fermée ou ouverte aux sympathisants. Cette consultation s'apparente à un plébiscite pour Retailleau face aux ambitions de Laurent Wauquiez, tandis que le chef de file des députés dénonce un choix truqué et annonce voter blanc.","importance":2},{"titre":"Ouvertures de commerces le 1er mai : le gouvernement a repris la main","lien":"https://www.lemonde.fr/politique/article/2026/04/18/ouvertures-de-commerces-le-1-mai-le-gouvernement-a-repris-la-main_6681115_823448.html","source":"Le Monde - Politique","date":"2026-04-18","theme":"Macron","resume":"Sébastien Lecornu présente un projet de loi autorisant boulangers et fleuristes à employer leurs salariés volontaires le jour férié du 1er mai moyennant une rémunération doublée. L'exécutif écarte ainsi une proposition de loi sénatoriale centriste plus ambitieuse qui incluait davantage de secteurs comme la culture et d'autres commerces de proximité.","importance":2},{"titre":"Élection présidentielle 2027 : à un an de l'échéance, les partis empêtrés dans la question des primaires","lien":"https://www.lemonde.fr/politique/article/2026/04/18/election-presidentielle-2027-a-un-an-de-l-echeance-les-partis-empetres-dans-la-question-des-primaires_6681110_823448.html","source":"Le Monde - Politique","date":"2026-04-18","theme":"Institutionnel","resume":"À douze mois du scrutin présidentiel, les formations politiques françaises peinent à trancher sur l'organisation de consultations internes pour désigner leurs candidats. Cette indécision procédurale complique la structuration des campagnes et révèle les tensions stratégiques au sein des différentes formations.","importance":2},{"titre":"Présidentielle : un an avant, les sondages sont souvent loin du compte","lien":"https://www.lemonde.fr/les-decodeurs/article/2026/04/18/presidentielle-un-an-avant-les-sondages-sont-souvent-loin-du-compte_6681104_4355770.html","source":"Le Monde - Politique","date":"2026-04-18","theme":"Institutionnel","resume":"Les enquêtes d'opinion réalisées douze mois avant l'élection présidentielle présentent généralement une faible fiabilité prédictive et ne reflètent pas fidèlement les résultats finaux du scrutin.","importance":2},{"titre":"Affaire libyenne : Sarkozy-Guéant, duel à distance","lien":"https://www.lesechos.fr/politique-societe/politique/affaire-libyenne-sarkozy-gueant-duel-a-distance-2227059","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Droite","resume":"Claude Guéant, absent du tribunal pour raisons médicales, a néanmoins bouleversé le procès en produisant un document de trois pages. Cette intervention remet en cause la stratégie de défense commune que l'ancien ministre de l'Intérieur avait jusqu'alors partagée avec Nicolas Sarkozy et Brice Hortefeux.","importance":3},{"titre":"Présidentielle 2027 : désignation directe de Bruno Retailleau ou primaire, les adhérents LR appelés à voter","lien":"https://www.lesechos.fr/politique-societe/politique/presidentielle-2027-designation-directe-de-bruno-retailleau-ou-primaire-les-adherents-lr-appeles-a-voter-2226951","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Droite","resume":"Ce week-end, les militants de la formation conservatrice sont appelés aux urnes pour choisir entre trois modalités de sélection de leur représentant pour la course à l'Élysée. Le résultat de cette consultation interne apparaît largement anticipé selon les observateurs.","importance":2},{"titre":"Assurance-chômage : l'Assemblée rejette l'accord sur les ruptures conventionnelles, un revers majeur pour Lecornu","lien":"https://www.lesechos.fr/politique-societe/regions/collectivites-territoriales-le-gouvernement-avance-sur-la-deconcentration-pas-sur-la-decentralisation-2226928","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Macron","resume":"Les parlementaires ont refusé de valider la réforme portée par les partenaires sociaux qui prévoyait de diminuer la période de versement des allocations en cas de séparation à l'amiable entre employeur et salarié. L'exécutif, confronté à cet échec, prévoit d'organiser un nouvel examen du texte, alors que la mise en application était programmée pour début septembre.","importance":3},{"titre":"Retrait de la proposition de loi Yadan, nouveau revers pour Lecornu à l'Assemblée","lien":"https://www.lesechos.fr/politique-societe/gouvernement/retrait-de-la-proposition-de-loi-yadan-nouveau-revers-pour-lecornu-a-lassemblee-2226908","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Macron","resume":"Les parlementaires du groupe de Gabriel Attal ont retiré le texte législatif de l'agenda parlementaire. Le gouvernement s'est engagé à présenter une initiative législative sur ce sujet d'ici la période estivale.","importance":2},{"titre":"Allocations familiales : plus de 500 millions d'euros de fraude détectés en 2025","lien":"https://www.lesechos.fr/politique-societe/societe/allocations-familiales-plus-de-500-millions-deuros-de-fraude-detectes-en-2025-2226798","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Institutionnel","resume":"La Caisse nationale des allocations familiales a rendu publics jeudi les chiffres de ses contrôles pour l'année écoulée, révélant une progression de 13 % des montants identifiés comme frauduleux. Cette communication intervient dans un contexte où l'exécutif renforce ses dispositifs de contrôle des irrégularités dans les domaines sociaux et fiscaux.","importance":2},{"titre":"Les rencontres des patrons avec le RN se multiplient à un an de la présidentielle 2027","lien":"https://www.lesechos.fr/politique-societe/politique/les-rencontres-des-patrons-avec-le-rn-se-multiplient-a-un-an-de-la-presidentielle-2027-2226681","source":"Les Echos - politique & société","date":"2026-04-18","theme":"RN","resume":"Après un dîner organisé par Marine Le Pen réunissant une quinzaine de dirigeants de grandes entreprises françaises, Jordan Bardella sera reçu par l'organisation patronale principale. Ces initiatives suscitent des discussions au sein du monde économique quant à la pertinence de dialoguer avec la formation politique.","importance":2},{"titre":"Enseignement supérieur privé : le projet de loi finalement examiné le 1er juin","lien":"https://www.lesechos.fr/politique-societe/education/enseignement-superieur-prive-le-projet-de-loi-finalement-examine-le-1er-juin-2226661","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Institutionnel","resume":"La conférence des présidents du Sénat a fixé au 1er juin la date d'examen du texte concernant la régulation des établissements d'études supérieures du secteur privé. Cette inscription à l'ordre du jour intervient après de nombreux délais et péripéties procédurales.","importance":2},{"titre":"Présidentielle 2027 : Attal, Philippe and co, qui pour sortir la tête de l'eau ?","lien":"https://www.lesechos.fr/politique-societe/politique/presidentielle-2027-attal-philippe-and-co-qui-pour-sortir-la-tete-de-leau-2226652","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Macron","resume":"Le bloc central compte plusieurs prétendants à l'élection présidentielle, ce qui leur évite d'être isolés face aux critiques. Néanmoins, pour rester crédibles dans la compétition, ces candidats devront trouver un accord pour désigner un représentant commun.","importance":2},{"titre":"Présidentielle 2027 : avec son tour de France, Édouard Philippe à contre-courant de Gabriel Attal","lien":"https://www.lesechos.fr/politique-societe/politique/presidentielle-2027-avec-son-tour-de-france-edouard-philippe-a-contre-courant-de-gabriel-attal-2226623","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Macron","resume":"Deux anciens chefs de gouvernement du président actuel s'opposent dans leurs approches de campagne pour l'élection présidentielle. Leurs méthodes divergentes reflètent des visions distinctes pour conquérir l'Élysée.","importance":2},{"titre":"Qualité de l'air : la pollution s'est aggravée en Île-de-France","lien":"https://www.lesechos.fr/politique-societe/societe/qualite-de-lair-la-pollution-sest-aggravee-en-ile-de-france-2226597","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Institutionnel","resume":"Les données publiées par Airparif révèlent une légère dégradation de la qualité atmosphérique dans la région parisienne durant l'année 2025. Après vingt ans d'améliorations continues, la dynamique positive s'essouffle et marque un ralentissement préoccupant de la trajectoire environnementale.","importance":2},{"titre":"Prix de l'essence : la lettre au vitriol des distributeurs contre le plafonnement des marges évoqué par Matignon","lien":"https://www.lesechos.fr/politique-societe/gouvernement/prix-de-lessence-la-lettre-au-vitriol-des-distributeurs-contre-le-plafonnement-des-marges-evoque-par-matignon-2226564","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Macron","resume":"Un projet de décret gouvernemental visant à encadrer les bénéfices des stations-service suscite une vive opposition du secteur de la distribution. Les professionnels proposent comme alternative la suppression temporaire des certificats d'économies d'énergie, une solution rejetée catégoriquement par les services du Premier ministre.","importance":2},{"titre":"Parc des Princes : Emmanuel Grégoire autorisé à renouer le dialogue avec le PSG","lien":"https://www.lesechos.fr/politique-societe/regions/parc-des-princes-emmanuel-gregoire-autorise-a-renouer-le-dialogue-avec-le-psg-2226427","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Institutionnel","resume":"L'édile parisien a reçu mardi l'aval de l'assemblée municipale pour engager des négociations avec le club de football concernant son avenir dans l'enceinte sportive. Deux propositions sont envisagées : céder la propriété de l'équipement ou établir un contrat de location de longue durée.","importance":2},{"titre":"Le gouvernement obtient enfin l'adoption de la loi simplification mais sans sauver les ZFE","lien":"https://www.lesechos.fr/politique-societe/politique/le-gouvernement-obtient-enfin-ladoption-de-la-loi-simplification-mais-sans-sauver-les-zfe-2226417","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Institutionnel","resume":"L'abandon des restrictions de circulation dans les zones urbaines polluées risque d'être censuré par les Sages pour non-conformité avec l'objet du texte. Le projet législatif intègre également des dispositions visant à alléger les contraintes administratives pesant sur les sociétés et modifie la réglementation sur l'utilisation des sols.","importance":2},{"titre":"Présidentielle 2027 : éteindre les écrans pour un débat éclairé","lien":"https://www.lesechos.fr/politique-societe/societe/presidentielle-2027-eteindre-les-ecrans-pour-un-debat-eclaire-2226413","source":"Les Echos - politique & société","date":"2026-04-18","theme":"Institutionnel","resume":"La diminution continue des pratiques de lecture touche désormais l'ensemble de la population, au-delà des seules jeunes générations. Cette tendance représente un défi crucial tant pour la santé collective que pour la qualité du débat démocratique à l'approche de l'élection présidentielle.","importance":2},{"titre":"« Faire tomber la monarchie technocratique » : Bruno Le Maire, le temps de la révolte","lien":"https://www.lefigaro.fr/politique/faire-tomber-la-monarchie-technocratique-bruno-le-maire-le-temps-de-la-revolte-20260418","source":"Le Figaro - Politique","date":"2026-04-18","theme":"Macron","resume":"L'ancien ministre de l'Économie publie un livre chez Gallimard dans lequel il revient sur son retour avorté au gouvernement Lecornu en octobre 2025, où il n'aura été ministre des Armées que 14 heures. Il y décrit la violence des réactions politiques et médiatiques liées au stigmate de la dette publique de mille milliards accumulée sous son mandat record de sept ans à Bercy.","importance":2}];
const couleurs = {"LFI":{"hex":"#e53e3e"},"RN":{"hex":"#1a3a6e"},"Macron":{"hex":"#1D9E75"},"Droite":{"hex":"#BA7517"},"Institutionnel":{"hex":"#888780"}};
const couleursTexte = {"RN":"#4a7ac8"};

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Institutionnel') === filter);
  document.getElementById('art-count').textContent = filtered.length + ' résultats';
  document.getElementById('art-list').innerHTML = filtered.map(a => {
    const c = couleurs[a.theme] || { hex: '#888780' };
    const textColor = couleursTexte[a.theme] || c.hex;
    return `<a class="article-row" href="${a.lien}" target="_blank">
      <div class="theme-stripe" style="background:${c.hex}"></div>
      <div style="flex:1;min-width:0">
        <div class="art-title">${a.titre}</div>
        ${a.resume ? `<div class="art-resume">${a.resume}</div>` : ''}
        <div class="art-meta">
          <span class="src-pill">${a.source || ''}</span>
          <span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${c.hex}22;color:${textColor};border:1px solid ${c.hex}44;font-weight:700">${a.theme}</span>
          ${a.date ? `<span class="date-pill">${a.date}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const color = pill.dataset.color;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active');
    const c = p.dataset.color;
    p.style.borderColor = c === '#fff' ? '#ffffff44' : c + '44';
    p.style.background = c === '#fff' ? '#ffffff11' : c + '11';
    p.style.opacity = '.6';
  });
  pill.classList.add('active');
  pill.style.borderColor = color;
  pill.style.background = color === '#fff' ? '#ffffff22' : color + '22';
  pill.style.opacity = '1';
  render(pill.dataset.f);
});

const firstPill = document.querySelector('.pill');
if (firstPill) {
  firstPill.classList.add('active');
  firstPill.style.borderColor = firstPill.dataset.color;
  firstPill.style.background = firstPill.dataset.color + '22';
  firstPill.style.opacity = '1';
  render(firstPill.dataset.f);
}
</script>
</body>
</html>
