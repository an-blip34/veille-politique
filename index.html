<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Veille politique</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif}
.mc{background:#0a0a0f;color:#e8e8e8;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #222}
.title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.subtitle{font-size:12px;color:#666;margin-top:4px}
.top-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.metric{background:#12121a;border:1px solid #222;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.source-list{display:flex;flex-direction:column;gap:4px}
.source-item{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.source-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rep-row:last-child{margin-bottom:0}
.rep-name{font-size:12px;font-weight:600;width:110px;flex-shrink:0}
.rep-bar-wrap{flex:1;height:5px;background:#1e1e2a;border-radius:3px}
.rep-bar{height:5px;border-radius:3px}
.rep-count{font-size:11px;color:#555;width:24px;text-align:right;flex-shrink:0}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;opacity:.6}
.pill:hover{opacity:.85;transform:scale(1.05)}
.pill.active{opacity:1;transform:scale(1.08);border-width:2px}
.articles-section{background:#12121a;border:1px solid #222;border-radius:10px;padding:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-bottom:1px solid #1a1a24;border-radius:6px;text-decoration:none}
.article-row:hover{background:#16161e}
.article-row:last-child{border-bottom:none}
.theme-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px}
.art-title{font-size:13px;color:#ddd;line-height:1.4;font-weight:500}
.art-resume{font-size:11px;color:#888;margin-top:4px;line-height:1.4}
.art-meta{font-size:11px;margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.src-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#1e1e2a;color:#bbb;font-weight:700}
.date-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#0a1a2a;color:#38bdf8;font-weight:700}
</style>
</head>
<body>
<div class="mc">
  <div class="header">
    <div class="title">Veille politique</div>
    <div class="subtitle">mercredi 8 avril 2026 — 18 articles analysés</div>
  </div>
  <div class="top-metrics">
    <div class="metric">
      <div class="metric-label">Sources</div>
      <div class="source-list"><div class="source-item"><div class="source-dot"></div>Le Monde - Politique</div><div class="source-item"><div class="source-dot"></div>Les Echos - politique & société</div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Répartition thèmes</div>
      <div class="rep-row"><span class="rep-name" style="color:#e53e3e">LFI</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:50%;background:#e53e3e"></div></div><span class="rep-count">3</span></div><div class="rep-row"><span class="rep-name" style="color:#BA7517">Droite</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:100%;background:#BA7517"></div></div><span class="rep-count">6</span></div><div class="rep-row"><span class="rep-name" style="color:#888780">Institutionnel</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:100%;background:#888780"></div></div><span class="rep-count">6</span></div><div class="rep-row"><span class="rep-name" style="color:#1D9E75">Macron</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:50%;background:#1D9E75"></div></div><span class="rep-count">3</span></div>
    </div>
  </div>
  <div class="filter-pills" id="pills"><div class="pill" data-f="LFI" data-color="#e53e3e" style="color:#e53e3e;border-color:#e53e3e44;background:#e53e3e11">LFI (3)</div><div class="pill" data-f="Droite" data-color="#BA7517" style="color:#BA7517;border-color:#BA751744;background:#BA751711">Droite (6)</div><div class="pill" data-f="Institutionnel" data-color="#888780" style="color:#888780;border-color:#88878044;background:#88878011">Institutionnel (6)</div><div class="pill" data-f="Macron" data-color="#1D9E75" style="color:#1D9E75;border-color:#1D9E7544;background:#1D9E7511">Macron (3)</div><div class="pill" data-f="all" data-color="#fff" style="color:#fff;border-color:#ffffff44;background:#ffffff11">Tous (18)</div></div>
  <div class="articles-section">
    <div class="section-header">
      <span class="section-title">Articles</span>
      <span style="font-size:11px;color:#555" id="art-count"></span>
    </div>
    <div id="art-list"></div>
  </div>
</div>
<script>
const data = [{"titre":"C'est le travail de la jeunesse modeste qui paie les retraites des riches et vieux parisiens","lien":"https://www.lemonde.fr/idees/article/2026/04/08/c-est-le-travail-de-la-jeunesse-modeste-qui-paie-les-retraites-des-riches-et-vieux-parisiens_6678209_3232.html","source":"Le Monde - Politique","date":"2026-04-08","theme":"LFI","resume":"Pierre-Cyrille Hautcœur analyse dans sa chronique l'ouvrage de deux historiens sur l'accumulation des richesses à Paris depuis deux siècles, mettant en évidence la ségrégation spatiale héritée du XIXe siècle. Il souligne que l'hostilité envers la Seine-Saint-Denis relève du racisme et du mépris de classe, alors que l'intégration économique et sociale des jeunes populations modestes constitue un enjeu crucial pour la prospérité du pays.","importance":2},{"titre":"L'union de la gauche peut-elle encore exister","lien":"https://www.lemonde.fr/podcasts/article/2026/04/08/l-union-de-la-gauche-peut-elle-encore-exister_6678153_5463015.html","source":"Le Monde - Politique","date":"2026-04-08","theme":"LFI","resume":"Après les municipales du 22 mars marquées par des tensions entre les différentes composantes de la gauche, le contraste est frappant avec la période 1997-2002 où Lionel Jospin dirigeait un gouvernement de gauche plurielle unifiant communistes, socialistes, radicaux et écologistes. Cette alliance avait permis des réformes majeures comme les 35 heures, le PACS et la CMU, rappelant la dernière grande coalition depuis le Front populaire de 1936.","importance":2},{"titre":"Soutenue par La France insoumise, la pétition contre la PPL Yadan dépasse les 500 000 signatures et révèle les clivages au sein du bloc central","lien":"https://www.lemonde.fr/politique/article/2026/04/08/soutenue-par-la-france-insoumise-la-petition-contre-la-ppl-yadan-depasse-les-500-000-signatures-et-revele-les-clivages-au-sein-du-bloc-central_6678114_823448.html","source":"Le Monde - Politique","date":"2026-04-08","theme":"LFI","resume":"Une mobilisation citoyenne d'ampleur, encouragée par le parti de gauche radicale, franchit un seuil symbolique majeur tout en exposant des divisions internes au camp présidentiel sur ce projet de loi.","importance":2},{"titre":"Parti socialiste en désaccord sur la stratégie pour la présidentielle : les opposants à Olivier Faure claquent la porte d'un bureau national","lien":"https://www.lemonde.fr/politique/article/2026/04/08/parti-socialiste-en-desaccord-sur-la-strategie-pour-la-presidentielle-les-opposants-a-olivier-faure-claquent-la-porte-d-un-bureau-national_6677945_823448.html","source":"Le Monde - Politique","date":"2026-04-08","theme":"Droite","resume":"Une crise interne secoue le PS avec le départ spectaculaire de plusieurs membres du bureau national hostiles au premier secrétaire. Ces tensions révèlent de profondes divisions au sein de la formation de gauche concernant le positionnement et les alliances en vue de l'élection présidentielle.","importance":2},{"titre":"Baisse des émissions de CO2 : l'alarmant coup de frein","lien":"https://www.lesechos.fr/politique-societe/societe/baisse-des-emissions-de-co2-lalarmant-coup-de-frein-2225154","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Institutionnel","resume":"Le Centre interprofessionnel technique d'études de la pollution atmosphérique a rendu public son rapport mensuel sur les gaz à effet de serre pour 2025. Bien que la tendance reste à la diminution, le rythme de réduction observé demeure largement en deçà des cibles fixées par la stratégie nationale climat.","importance":2},{"titre":"Financement libyen : pointant les « erreurs de ses proches », Nicolas Sarkozy promet sa « vérité »","lien":"https://www.lesechos.fr/politique-societe/politique/financement-libyen-pointant-les-erreurs-de-ses-proches-nicolas-sarkozy-promet-sa-verite-2225164","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Droite","resume":"L'ancien chef de l'État comparaît devant la juridiction parisienne dans le cadre de l'affaire du supposé soutien financier de la Libye à sa course présidentielle. Après plus de huit heures d'audition menée par le président Olivier Géron, le prévenu a vu la tension monter au fil du resserrement des interrogations.","importance":3},{"titre":"« Une vague sismique » : la France comptera 1,7 million d'élèves en moins dans dix ans","lien":"https://www.lesechos.fr/politique-societe/education/une-vague-sismique-la-france-comptera-17-million-deleves-en-moins-dans-dix-ans-2225143","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Institutionnel","resume":"Le ministère de l'Éducation nationale anticipe une diminution de 14,2 % des effectifs scolaires d'ici 2035, nécessitant une réorganisation profonde du système éducatif. La capitale sera particulièrement touchée par ce déclin démographique avec une réduction potentielle d'un tiers de ses populations scolaires.","importance":3},{"titre":"Energie : la France veut son « Independence Year »","lien":"https://www.lesechos.fr/politique-societe/gouvernement/energie-la-france-veut-son-independance-year-2225128","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Macron","resume":"Le gouvernement profite du conflit iranien pour reformuler sa stratégie de transition énergétique, en mettant désormais l'accent sur la réduction des dépendances externes plutôt que sur les enjeux climatiques. L'électrification des usages est repositionnée sous l'angle de la souveraineté nationale.","importance":2},{"titre":"Prix de l'essence : le gouvernement attendu de pied ferme sur le coup de pouce promis pour les aides à domicile","lien":"https://www.lesechos.fr/politique-societe/politique/lobservatoire-politique-elabe-les-echos-1017387","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Macron","resume":"Les professionnels du service à la personne sollicitent l'exécutif pour obtenir un soutien financier face à la hausse significative du coût des carburants. Ces salariés, contraints d'utiliser quotidiennement leur véhicule pour se déplacer chez les particuliers, subissent de plein fouet l'augmentation des tarifs à la pompe.","importance":2},{"titre":"SONDAGE - Tous les résultats de l'Observatoire politique Elabe « Les Echos »","lien":"https://www.lesechos.fr/politique-societe/politique","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Institutionnel","resume":"Publication des données complètes de l'enquête d'opinion menée par l'institut Elabe pour le quotidien économique. L'extrait fait référence au maintien du contrôle de la métropole marseillaise par les formations de droite lors des élections locales.","importance":2},{"titre":"Municipales 2026 : la droite conserve la métropole Aix-Marseille-Provence mais devra composer","lien":"https://www.lesechos.fr/politique-societe/regions/municipales-2026-la-droite-conserve-la-metropole-aix-marseille-provence-mais-devra-composer-2225027","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Droite","resume":"Nicolas Isnard, édile LR de Salon-de-Provence, accède à la présidence de la plus grande intercommunalité française. Il affiche son ambition de privilégier une approche pragmatique centrée sur les territoires et leurs réalisations, en mettant de côté les querelles partisanes.","importance":2},{"titre":"Carburants : la crise qui parle","lien":"https://www.lesechos.fr/politique-societe/politique/carburants-la-crise-qui-parle-2224915","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Institutionnel","resume":"L'augmentation du coût de l'essence et du diesel contraint l'ensemble des formations politiques à clarifier leurs positions et leurs propositions de financement. Ce débat intervient dans un contexte préélectoriel sensible, à douze mois du scrutin présidentiel.","importance":2},{"titre":"Fonction publique : le gouvernement propose une négociation sociale consacrée à l'IA","lien":"https://www.lesechos.fr/politique-societe/gouvernement/fonction-publique-le-gouvernement-propose-une-negociation-sociale-consacree-a-lia-2224857","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Macron","resume":"David Amiel, ministre de l'Action et des Comptes publics, lance des discussions avec les partenaires sociaux pour réguler le déploiement des technologies d'intelligence artificielle au sein des administrations. L'objectif est d'aboutir à un accord-cadre avant la fin de l'automne.","importance":2},{"titre":"« C'est la secte du temple solaire où on verrouille tout » : la présidentielle en ligne de mire, LR étale ses divisions","lien":"https://www.lesechos.fr/politique-societe/politique/cest-la-secte-du-temple-solaire-ou-on-verrouille-tout-la-presidentielle-en-ligne-de-mire-lr-etale-ses-divisions-2224850","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Droite","resume":"Bruno Retailleau maintient sa volonté d'être candidat malgré les tensions au sein du parti et la concurrence d'Edouard Philippe. Une procédure de désignation directe par les militants est prévue le 18 avril, contournant l'organisation d'une primaire traditionnelle.","importance":3},{"titre":"Affaire du financement libyen : interrogatoire décisif pour Nicolas Sarkozy","lien":"https://www.lesechos.fr/politique-societe/politique/affaire-du-financement-libyen-interrogatoire-decisif-pour-nicolas-sarkozy-2224816","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Droite","resume":"Après trois semaines d'audience, l'ex-chef de l'État doit comparaître devant la juridiction parisienne ce mardi 7 avril. Il s'expliquera sur les accusations concernant le soutien financier présumé du dirigeant libyen Mouammar Kadhafi à sa course électorale de 2007.","importance":3},{"titre":"« La consigne, c'est de taper matin, midi et soir » : pourquoi LR cherche à installer LFI comme son meilleur ennemi","lien":"https://www.lesechos.fr/politique-societe/politique/la-consigne-cest-de-taper-matin-midi-et-soir-pourquoi-lr-cherche-a-installer-lfi-comme-son-meilleur-ennemi-2224761","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Droite","resume":"Bruno Retailleau multiplie les attaques contre le parti de Jean-Luc Mélenchon dans une stratégie délibérée. Cette posture vise à positionner Les Républicains face à la gauche radicale pour des motifs tactiques précis.","importance":2},{"titre":"Périscolaire à Paris : Emmanuel Grégoire dévoile son plan d'action pour « garantir la transparence totale »","lien":"https://www.lesechos.fr/politique-societe/education/periscolaire-a-paris-emmanuel-gregoire-devoile-son-plan-daction-pour-garantir-la-transparence-totale-2224698","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Institutionnel","resume":"L'édile parisien présente un dispositif comprenant un système de remontée d'informations facilité et clairement identifié pour les usagers. Son programme inclut également des actions immédiates et l'embauche de personnel encadrant selon des procédures de vérification renforcées.","importance":2},{"titre":"Les collectivités locales appelées à accélérer leur transition climatique","lien":"https://www.lesechos.fr/politique-societe/societe/les-collectivites-locales-appelees-a-accelerer-leur-transition-climatique-2224660","source":"Les Echos - politique & société","date":"2026-04-08","theme":"Institutionnel","resume":"Le Haut Conseil pour le climat a publié vendredi un rapport constatant que les efforts écologiques des territoires sont inégaux selon les régions. Une accélération des mesures locales est nécessaire pour atteindre les ambitions fixées dans la stratégie nationale.","importance":2}];
const couleurs = {"LFI":{"hex":"#e53e3e"},"RN":{"hex":"#1a3a6e"},"Macron":{"hex":"#1D9E75"},"Droite":{"hex":"#BA7517"},"Institutionnel":{"hex":"#888780"}};
const couleursTexte = {"RN":"#4a7ac8"};

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Institutionnel') === filter);
  document.getElementById('art-count').textContent = filtered.length + ' résultats';
  document.getElementById('art-list').innerHTML = filtered.map(a => {
    const c = couleurs[a.theme] || { hex: '#888780' };
    const textColor = couleursTexte[a.theme] || c.hex;
    return `<a class="article-row" href="${a.lien}" target="_blank">
      <div class="theme-stripe" style="background:${c.hex}"></div>
      <div style="flex:1;min-width:0">
        <div class="art-title">${a.titre}</div>
        ${a.resume ? `<div class="art-resume">${a.resume}</div>` : ''}
        <div class="art-meta">
          <span class="src-pill">${a.source || ''}</span>
          <span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${c.hex}22;color:${textColor};border:1px solid ${c.hex}44;font-weight:700">${a.theme}</span>
          ${a.date ? `<span class="date-pill">${a.date}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const color = pill.dataset.color;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active');
    const c = p.dataset.color;
    p.style.borderColor = c === '#fff' ? '#ffffff44' : c + '44';
    p.style.background = c === '#fff' ? '#ffffff11' : c + '11';
    p.style.opacity = '.6';
  });
  pill.classList.add('active');
  pill.style.borderColor = color;
  pill.style.background = color === '#fff' ? '#ffffff22' : color + '22';
  pill.style.opacity = '1';
  render(pill.dataset.f);
});

const firstPill = document.querySelector('.pill');
if (firstPill) {
  firstPill.classList.add('active');
  firstPill.style.borderColor = firstPill.dataset.color;
  firstPill.style.background = firstPill.dataset.color + '22';
  firstPill.style.opacity = '1';
  render(firstPill.dataset.f);
}
</script>
</body>
