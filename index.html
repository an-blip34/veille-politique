*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif}
.mc{background:#0a0a0f;color:#e8e8e8;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #222}
.title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.subtitle{font-size:12px;color:#666;margin-top:4px}
.top-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.metric{background:#12121a;border:1px solid #222;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.source-list{display:flex;flex-direction:column;gap:4px}
.source-item{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.source-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rep-row:last-child{margin-bottom:0}
.rep-name{font-size:12px;font-weight:600;width:110px;flex-shrink:0}
.rep-bar-wrap{flex:1;height:5px;background:#1e1e2a;border-radius:3px}
.rep-bar{height:5px;border-radius:3px}
.rep-count{font-size:11px;color:#555;width:24px;text-align:right;flex-shrink:0}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;opacity:.6}
.pill:hover{opacity:.85;transform:scale(1.05)}
.pill.active{opacity:1;transform:scale(1.08);border-width:2px}
.articles-section{background:#12121a;border:1px solid #222;border-radius:10px;padding:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-bottom:1px solid #1a1a24;border-radius:6px;text-decoration:none}
.article-row:hover{background:#16161e}
.article-row:last-child{border-bottom:none}
.theme-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px}
.art-title{font-size:13px;color:#ddd;line-height:1.4;font-weight:500}
.art-meta{font-size:11px;color:#555;margin-top:3px}
.art-resume{font-size:11px;color:#888;margin-top:2px;line-height:1.4}
.src-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;background:#1e1e2a;color:#666;margin-right:6px}
</style>

i-ressuscite-les-heures-sombres-dernier-sprint-pour-charles-alloncle-les-coulisses-politiques-de-la-semaine","source":"Valeurs Actuelles - Politique","date":"2026-04-04","theme":"LFI","resume":"Polémique autour d'un député LFI et campagne de Charles Alloncle en coulisses.","importance":2},{"titre":"« Il y a de la violence d'extrême droite dans le pays » : le député LFI Raphaël Arnault sort du silence et veut retourner à l'Assemblée","lien":"https://www.valeursactuelles.com/politique/il-y-a-de-la-violence-dextreme-droite-dans-le-pays-le-depute-lfi-raphael-arnault-sort-du-silence-et-veut-retourner-a-lassemblee","source":"Valeurs Actuelles - Politique","date":"2026-04-04","theme":"LFI","resume":"Le député LFI Raphaël Arnault s'exprime et souhaite reprendre son activité parlementaire.","importance":2},{"titre":"Pas-de-Calais : la nouvelle maire RN retire la plaque en hommage au terroriste Georges Ibrahim Abdallah","lien":"https://www.valeursactuelles.com/politique/pas-de-calais-la-nouvelle-maire-rn-retire-la-plaque-en-hommage-au-terroriste-georges-ibrahim-abdallah","source":"Valeurs Actuelles - Politique","date":"2026-04-04","theme":"RN","resume":"Une maire RN retire une plaque honorant le terroriste Georges Ibrahim Abdallah.","importance":2},{"titre":"Valérie Pécresse écorche le nom de Bally Bagayoko, LFI hurle au racisme","lien":"https://www.valeursactuelles.com/politique/valerie-pecresse-ecorche-le-nom-de-bally-bagayoko-lfi-hurle-au-racisme","source":"Valeurs Actuelles - Politique","date":"2026-04-04","theme":"LFI","resume":"Pécresse écorche un nom, LFI dénonce du racisme.","importance":1},{"titre":"Depuis sa victoire à Nice, Éric Ciotti grimpe de six places dans le classement des personnalités influentes","lien":"https://www.valeursactuelles.com/politique/depuis-sa-victoire-a-nice-eric-ciotti-grimpe-de-six-places-dans-le-classement-des-personnalites-influentes","source":"Valeurs Actuelles - Politique","date":"2026-04-04","theme":"Droite","resume":"Éric Ciotti gagne six places au classement des personnalités influentes après Nice.","importance":2},{"titre":"Le journaliste Jacques Cardoze affirme que LFI transmettait des informations à « Complément d'enquête »","lien":"https://www.valeursactuelles.com/politique/le-journaliste-jacques-cardoze-affirme-que-lfi-transmettait-des-informations-a-complement-denquete","source":"Valeurs Actuelles - Politique","date":"2026-04-04","theme":"LFI","resume":"Jacques Cardoze accuse LFI de transmettre des informations à l'émission Complément d'enquête.","importance":2},{"titre":"Neutralité et service public","lien":"https://www.valeursactuelles.com/clubvaleurs/politique/neutralite-et-service-public","source":"Valeurs Actuelles - Politique","date":"2026-04-04","theme":"Institutionnel","resume":"Débat sur la neutralité dans le service public français.","importance":2}];
const couleurs = {"LFI":{"hex":"#7F77DD"},"RN":{"hex":"#378ADD"},"Macron":{"hex":"#1D9E75"},"Droite":{"hex":"#BA7517"},"Institutionnel":{"hex":"#888780"}};

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Institutionnel') === filter);
  document.getElementById('art-count').textContent = filtered.length + ' résultats';
  document.getElementById('art-list').innerHTML = filtered.map(a => {
    const c = couleurs[a.theme] || { hex: '#888780' };
    return `<a class="article-row" href="${a.lien}" target="_blank">
      <div class="theme-stripe" style="background:${c.hex}"></div>
      <div style="flex:1;min-width:0">
        <div class="art-title">${a.titre}</div>
        <div class="art-resume">${a.resume || ''}</div>
        <div class="art-meta"><span class="src-pill">${a.source || ''}</span><span style="color:${c.hex};font-size:10px">${a.theme}</span></div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const color = pill.dataset.color;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active');
    const c = p.dataset.color;
    p.style.borderColor = c === '#fff' ? '#ffffff44' : c + '44';
    p.style.background = c === '#fff' ? '#ffffff11' : c + '11';
    p.style.opacity = '.6';
  });
  pill.classList.add('active');
  pill.style.borderColor = color;
  pill.style.background = color === '#fff' ? '#ffffff22' : color + '22';
  pill.style.opacity = '1';
  render(pill.dataset.f);
});

const firstPill = document.querySelector('.pill');
if (firstPill) {
  firstPill.classList.add('active');
  firstPill.style.borderColor = firstPill.dataset.color;
  firstPill.style.background = firstPill.dataset.color + '22';
  firstPill.style.opacity = '1';
  render(firstPill.dataset.f);
}
</script>
