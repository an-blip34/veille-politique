<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; }
.container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
.header { border-bottom: 2px solid #1a1a1a; padding-bottom: 16px; margin-bottom: 24px; }
.header h1 { font-size: 24px; font-weight: 700; }
.header p { font-size: 13px; color: #888; margin-top: 4px; }
.grid { display: grid; grid-template-columns: 280px 1fr; gap: 24px; }
.sidebar { background: white; border-radius: 8px; padding: 16px; height: fit-content; border: 1px solid #eee; }
.sidebar h2 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
.filters { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.filter-btn { padding: 8px 12px; border-radius: 20px; border: 1px solid #ddd; background: white; color: #555; cursor: pointer; font-size: 13px; text-align: left; transition: all 0.15s; }
.filter-btn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.main { display: flex; flex-direction: column; gap: 20px; }
.theme-block { background: white; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
.theme-header { padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
.theme-count { font-size: 12px; opacity: 0.8; }
.article-item { padding: 10px 16px; border-top: 1px solid #f0f0f0; display: flex; align-items: flex-start; gap: 10px; }
.article-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.article-link { font-size: 13px; color: #1a1a1a; text-decoration: none; line-height: 1.4; font-weight: 500; }
.article-link:hover { text-decoration: underline; }
.article-resume { font-size: 11px; color: #888; margin-top: 3px; }
.article-meta { font-size: 11px; color: #aaa; margin-top: 3px; }
.importance { font-size: 12px; margin-left: auto; flex-shrink: 0; }
.hidden { display: none; }
@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>

et campagne de Charles Alloncle","importance":2},{"titre":"« Il y a de la violence d'extrême droite dans le pays » : le député LFI Raphaël Arnault sort du silence et veut retourner à l'Assemblée","lien":"https://www.valeursactuelles.com/politique/il-y-a-de-la-violence-dextreme-droite-dans-le-pays-le-depute-lfi-raphael-arnault-sort-du-silence-et-veut-retourner-a-lassemblee","source":"Valeurs Actuelles - Politique","date":"","theme":"LFI","resume":"Le député LFI Raphaël Arnault évoque la violence d'extrême droite et son retour à l'Assemblée.","importance":2},{"titre":"Pas-de-Calais : la nouvelle maire RN retire la plaque en hommage au terroriste Georges Ibrahim Abdallah","lien":"https://www.valeursactuelles.com/politique/pas-de-calais-la-nouvelle-maire-rn-retire-la-plaque-en-hommage-au-terroriste-georges-ibrahim-abdallah","source":"Valeurs Actuelles - Politique","date":"","theme":"RN","resume":"Une maire RN du Pas-de-Calais retire une plaque honorant Georges Ibrahim Abdallah.","importance":2},{"titre":"Valérie Pécresse écorche le nom de Bally Bagayoko, LFI hurle au racisme","lien":"https://www.valeursactuelles.com/politique/valerie-pecresse-ecorche-le-nom-de-bally-bagayoko-lfi-hurle-au-racisme","source":"Valeurs Actuelles - Politique","date":"","theme":"LFI","resume":"Pécresse prononce mal le nom de Bagayoko, LFI dénonce du racisme.","importance":1},{"titre":"Depuis sa victoire à Nice, Eric Ciotti grimpe de six places dans le classement des personnalités influentes","lien":"https://www.valeursactuelles.com/politique/depuis-sa-victoire-a-nice-eric-ciotti-grimpe-de-six-places-dans-le-classement-des-personnalites-influentes","source":"Valeurs Actuelles - Politique","date":"","theme":"Droite","resume":"Eric Ciotti gagne six places au classement des personnalités influentes après Nice.","importance":2},{"titre":"Le journaliste Jacques Cardoze affirme que LFI transmettait des informations à « Complément d'enquête »","lien":"https://www.valeursactuelles.com/politique/le-journaliste-jacques-cardoze-affirme-que-lfi-transmettait-des-informations-a-complement-denquete","source":"Valeurs Actuelles - Politique","date":"","theme":"LFI","resume":"Jacques Cardoze accuse LFI de transmettre des informations à l'émission Complément d'enquête.","importance":2},{"titre":"Neutralité et service public","lien":"https://www.valeursactuelles.com/clubvaleurs/politique/neutralite-et-service-public","source":"Valeurs Actuelles - Politique","date":"","theme":"Institutionnel","resume":"Question de la neutralité dans le service public français.","importance":2},{"titre":"Raphaël Arnault « no show » : sur les traces du député LFI disparu des radars","lien":"https://www.valeursactuelles.com/clubvaleurs/regions/provence-alpes-cote-dazur/vaucluse/avignon/politique/raphael-arnault-no-show-sur-les-traces-du-depute-lfi-disparu-des-radars","source":"Valeurs Actuelles - Politique","date":"","theme":"LFI","resume":"Le député LFI Raphaël Arnault est absent et introuvable des radars politiques.","importance":2},{"titre":"À Nice, Éric Ciotti savoure sa nouvelle vie de maire","lien":"https://www.valeursactuelles.com/clubvaleurs/regions/provence-alpes-cote-dazur/alpes-maritimes/nice/politique/a-nice-eric-ciotti-savoure-sa-nouvelle-vie-de-maire","source":"Valeurs Actuelles - Politique","date":"","theme":"Droite","resume":"Éric Ciotti prend ses fonctions de maire de Nice après son élection.","importance":2},{"titre":"JO 2024 : la Cour des comptes dénonce les dépenses « démesurées » de la Métropole du Grand Paris","lien":"https://www.valeursactuelles.com/politique/jo-2024-la-cour-des-comptes-denonce-les-depenses-demesurees-de-la-metropole-du-grand-paris","source":"Valeurs Actuelles - Politique","date":"","theme":"Institutionnel","resume":"La Cour des comptes critique les dépenses excessives de la Métropole pour les JO.","importance":2},{"titre":"« J'en avais marre de voir le drapeau européen sur ma mairie, je l'ai décroché », la maire RN assume","lien":"https://www.valeursactuelles.com/clubvaleurs/regions/occitanie/pyrenees-orientales/na/politique/jen-avais-marre-de-voir-le-drapeau-europeen-sur-ma-mairie-je-lai-decroche-la-maire-rn-assume","source":"Valeurs Actuelles - Politique","date":"","theme":"RN","resume":"Une maire RN retire le drapeau européen de sa mairie par conviction.","importance":2},{"titre":"Anne Hidalgo visée par une enquête du PNF sur l'attribution d'un marché public, la mairie de Paris perquisitionnée","lien":"https://www.valeursactuelles.com/politique/anne-hidalgo-visee-par-une-enquete-du-pnf-sur-lattribution-dun-marche-public-la-mairie-de-paris-perquisitionnee","source":"Valeurs Actuelles - Politique","date":"","theme":"Institutionnel","resume":"Anne Hidalgo visée par une enquête sur un marché public, perquisition à Paris.","importance":3}];
const couleurs = {"LFI":{"bg":"#EEEDFE","border":"#7F77DD","text":"#3C3489","dot":"#7F77DD"},"RN":{"bg":"#E6F1FB","border":"#378ADD","text":"#0C447C","dot":"#378ADD"},"Macron":{"bg":"#EAF3DE","border":"#639922","text":"#27500A","dot":"#1D9E75"},"Droite":{"bg":"#FAEEDA","border":"#BA7517","text":"#633806","dot":"#BA7517"},"Institutionnel":{"bg":"#F1EFE8","border":"#888780","text":"#444441","dot":"#888780"}};

function importance(n) {
  return '●'.repeat(n) + '○'.repeat(3 - n);
}

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Institutionnel') === filter);
  const parTheme = {};
  for (const a of filtered) {
    const t = a.theme || 'Institutionnel';
    if (!parTheme[t]) parTheme[t] = [];
    parTheme[t].push(a);
  }
  const container = document.getElementById('articles');
  container.innerHTML = Object.entries(parTheme).map(([theme, arts]) => {
    const c = couleurs[theme] || couleurs.Institutionnel;
    const lignes = arts.sort((a, b) => (b.importance || 0) - (a.importance || 0)).map(a => `
      <div class="article-item">
        <div class="article-dot" style="background:${c.dot};"></div>
        <div style="flex:1;">
          <a class="article-link" href="${a.lien}" target="_blank">${a.titre}</a>
          <div class="article-resume">${a.resume || ''}</div>
          <div class="article-meta">${a.source || ''}</div>
        </div>
        <div class="importance" style="color:${c.text};">${importance(a.importance || 1)}</div>
      </div>
    `).join('');
    return `
      <div class="theme-block">
        <div class="theme-header" style="background:${c.bg};border-left:4px solid ${c.border};">
          <span style="font-size:14px;font-weight:700;color:${c.text};">${theme}</span>
          <span class="theme-count" style="color:${c.text};">${arts.length} article${arts.length > 1 ? 's' : ''}</span>
        </div>
        ${lignes}
      </div>
    `;
  }).join('');
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(btn.dataset.filter);
});

render('all');
</script>
</body>
