<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Veille politique</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif}
.mc{background:#0a0a0f;color:#e8e8e8;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #222}
.title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.subtitle{font-size:12px;color:#666;margin-top:4px}
.top-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.metric{background:#12121a;border:1px solid #222;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.source-list{display:flex;flex-direction:column;gap:4px}
.source-item{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.source-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rep-row:last-child{margin-bottom:0}
.rep-name{font-size:12px;font-weight:600;width:110px;flex-shrink:0}
.rep-bar-wrap{flex:1;height:5px;background:#1e1e2a;border-radius:3px}
.rep-bar{height:5px;border-radius:3px}
.rep-count{font-size:11px;color:#555;width:24px;text-align:right;flex-shrink:0}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;opacity:.6}
.pill:hover{opacity:.85;transform:scale(1.05)}
.pill.active{opacity:1;transform:scale(1.08);border-width:2px}
.articles-section{background:#12121a;border:1px solid #222;border-radius:10px;padding:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-bottom:1px solid #1a1a24;border-radius:6px;text-decoration:none}
.article-row:hover{background:#16161e}
.article-row:last-child{border-bottom:none}
.theme-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px}
.art-title{font-size:13px;color:#ddd;line-height:1.4;font-weight:500}
.art-resume{font-size:11px;color:#888;margin-top:4px;line-height:1.4}
.art-meta{font-size:11px;margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.src-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#1e1e2a;color:#bbb;font-weight:700}
.date-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#0a1a2a;color:#38bdf8;font-weight:700}
</style>
</head>
<body>
<div class="mc">
  <div class="header">
    <div class="title">Veille politique</div>
    <div class="subtitle">samedi 11 avril 2026 — 19 articles analysés</div>
  </div>
  <div class="top-metrics">
    <div class="metric">
      <div class="metric-label">Sources</div>
      <div class="source-list"><div class="source-item"><div class="source-dot"></div>Le Monde - Politique</div><div class="source-item"><div class="source-dot"></div>Les Echos - politique & société</div><div class="source-item"><div class="source-dot"></div>Le Figaro - Politique</div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Répartition thèmes</div>
      <div class="rep-row"><span class="rep-name" style="color:#1D9E75">Macron</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:67%;background:#1D9E75"></div></div><span class="rep-count">6</span></div><div class="rep-row"><span class="rep-name" style="color:#888780">Institutionnel</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:100%;background:#888780"></div></div><span class="rep-count">9</span></div><div class="rep-row"><span class="rep-name" style="color:#BA7517">Droite</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:33%;background:#BA7517"></div></div><span class="rep-count">3</span></div><div class="rep-row"><span class="rep-name" style="color:#4a7ac8">RN</span><div class="rep-bar-wrap"><div class="rep-bar" style="width:11%;background:#1a3a6e"></div></div><span class="rep-count">1</span></div>
    </div>
  </div>
  <div class="filter-pills" id="pills"><div class="pill" data-f="Macron" data-color="#1D9E75" style="color:#1D9E75;border-color:#1D9E7544;background:#1D9E7511">Macron (6)</div><div class="pill" data-f="Institutionnel" data-color="#888780" style="color:#888780;border-color:#88878044;background:#88878011">Institutionnel (9)</div><div class="pill" data-f="Droite" data-color="#BA7517" style="color:#BA7517;border-color:#BA751744;background:#BA751711">Droite (3)</div><div class="pill" data-f="RN" data-color="#4a7ac8" style="color:#4a7ac8;border-color:#4a7ac844;background:#1a3a6e11">RN (1)</div><div class="pill" data-f="all" data-color="#fff" style="color:#fff;border-color:#ffffff44;background:#ffffff11">Tous (19)</div></div>
  <div class="articles-section">
    <div class="section-header">
      <span class="section-title">Articles</span>
      <span style="font-size:11px;color:#555" id="art-count"></span>
    </div>
    <div id="art-list"></div>
  </div>
</div>
<script>
const data = [{"titre":"Pompes à chaleur et location de véhicules : dans l'attente du grand plan d'électrification, les premières pistes de Sébastien Lecornu","lien":"https://www.lemonde.fr/economie/article/2026/04/11/pompes-a-chaleur-et-location-de-vehicules-dans-l-attente-du-grand-plan-d-electrification-les-premieres-pistes-de-sebastien-lecornu_6679338_3234.html","source":"Le Monde - Politique","date":"2026-04-11","theme":"Macron","resume":"Le Premier ministre annonce que les aides publiques destinées à remplacer les énergies fossiles importées par l'électricité décarbonée passeront de 5,5 à 10 milliards d'euros annuels d'ici 2030. Ces mesures, présentées dans le contexte de la flambée des prix des carburants liée à la guerre au Moyen-Orient, cibleront prioritairement les travailleurs, familles et retraités pour le chauffage et la mobilité. Le plan complet d'électrification des usages, attendu depuis deux mois, n'a pas encore été dévoilé.","importance":2},{"titre":"Thomas Piketty : 1789, 1945, 2026, trois crises de la dette","lien":"https://www.lemonde.fr/idees/article/2026/04/11/thomas-piketty-1789-1945-2026-trois-crises-de-la-dette_6679243_3232.html","source":"Le Monde - Politique","date":"2026-04-11","theme":"Institutionnel","resume":"L'économiste et directeur d'études à l'EHESS souligne que malgré l'endettement actuel, les fondamentaux économiques français demeurent robustes. Il appelle à surmonter le conservatisme politique et à réformer le comportement des plus fortunés, rappelant que les crises passées ont toujours nécessité des transformations politiques majeures pour être résolues.","importance":2},{"titre":"À Djibouti, Ismail Omar Guelleh s'autoproclame réélu pour un sixième mandat","lien":"https://www.lemonde.fr/afrique/article/2026/04/11/a-djibouti-ismail-omar-guelleh-s-autoproclame-reelu-pour-un-sixieme-mandat_6679173_3212.html","source":"Le Monde - Politique","date":"2026-04-11","theme":"Institutionnel","resume":"Le président djiboutien annonce sa victoire électorale sans attendre les résultats officiels, prolongeant ainsi son emprise sur le pouvoir entamée il y a plusieurs décennies.","importance":1},{"titre":"Moody's maintient la note souveraine de la France à Aa3","lien":"https://www.lemonde.fr/economie/article/2026/04/11/moody-s-maintient-la-note-souveraine-de-la-france-a-aa3_6679139_3234.html","source":"Le Monde - Politique","date":"2026-04-11","theme":"Institutionnel","resume":"L'agence de notation financière américaine conserve son évaluation de la dette publique française au même niveau, sans dégradation ni amélioration de sa perspective.","importance":2},{"titre":"Électrification, chaudières à gaz, leasing électrique : face à la crise, Lecornu veut « changer d'échelle »","lien":"https://www.lesechos.fr/politique-societe/gouvernement/electrification-chaudieres-a-gaz-leasing-electrique-face-a-la-crise-lecornu-veut-changer-dechelle-2225856","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Macron","resume":"Depuis Matignon, le Premier ministre a dévoilé un ensemble de dispositifs ambitieux visant à accélérer la transition énergétique du pays. Cette intervention intervient dans un contexte budgétaire contraint, le chef du gouvernement cherchant à répondre aux préoccupations immédiates des Français.","importance":2},{"titre":"Insertion des jeunes : l'alerte des Écoles de la deuxième chance","lien":"https://www.lesechos.fr/politique-societe/politique/proces-du-financement-libyen-sarkozy-charge-toujours-plus-ses-anciens-collaborateurs-2225783","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Institutionnel","resume":"Le réseau a pris en charge 18.000 stagiaires décrocheurs l'année dernière dans un climat de restrictions financières. Les Pays de la Loire ont supprimé leur financement, jugeant les dépenses excessives, le double du montant acceptable selon la collectivité régionale.","importance":2},{"titre":"VIDEO - Que contient la proposition de loi sur le 1er-Mai ?","lien":"https://www.lesechos.fr/politique-societe/politique/video-que-contient-la-proposition-de-loi-sur-le-1er-mai-2225722","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Institutionnel","resume":"Les parlementaires examinent un texte législatif portant sur les conditions de travail lors de la fête du travail, notamment pour les commerces de proximité. Le projet a été transmis vendredi à une commission mixte paritaire pour arbitrage entre les deux chambres.","importance":2},{"titre":"Guerre au Moyen-Orient : 20 millions d'euros en plus pour les agriculteurs","lien":"https://www.lesechos.fr/politique-societe/gouvernement/guerre-au-moyen-orient-20-millions-deuros-en-plus-pour-les-agriculteurs-2225592","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Macron","resume":"L'exécutif a dévoilé jeudi une aide complémentaire destinée au monde agricole confronté à l'augmentation importante des tarifs énergétiques. Le principal syndicat agricole juge toutefois cette enveloppe budgétaire insuffisante pour répondre aux difficultés du secteur.","importance":2},{"titre":"Record de réclamations auprès de la Défenseure des droits","lien":"https://www.lesechos.fr/politique-societe/societe/record-de-reclamations-aupres-de-la-defenseure-des-droits-2225450","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Institutionnel","resume":"L'autorité indépendante a publié son rapport annuel ce jeudi, constatant une augmentation jamais observée du nombre de saisines durant l'année précédente. Le passage au numérique des démarches administratives figure parmi les principales causes identifiées de cette progression.","importance":2},{"titre":"Essence : pas de nouvelles mesures d'aide, annonce le ministre de l'Économie, qui mise sur la baisse des prix à la pompe","lien":"https://www.lesechos.fr/politique-societe/gouvernement/essence-pas-de-nouvelles-mesures-daide-annonce-le-ministre-de-leconomie-qui-mise-sur-la-baisse-des-prix-a-la-pompe-2225444","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Macron","resume":"Le gouvernement renonce à intervenir financièrement pour soutenir les automobilistes face aux prix des carburants. Roland Lescure justifie cette décision par la récente diminution des cours du brut, qui devrait mécaniquement se répercuter dans les stations-service et produire un effet similaire à un allègement fiscal sans peser sur les finances publiques.","importance":2},{"titre":"Renaud Muselier s'apprête à quitter la région Paca et vise le Sénat","lien":"https://www.lesechos.fr/politique-societe/politique/renaud-muselier-sapprete-a-quitter-la-region-paca-et-vise-le-senat-2225355","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Macron","resume":"Le responsable de l'exécutif régional sud-est, qui siège au bureau exécutif de Renaissance, entend poursuivre son engagement politique au niveau national depuis la capitale. Il justifie cette ambition sénatoriale par sa volonté de lutter contre les mouvements extrémistes.","importance":2},{"titre":"Sortie de l'Alsace du Grand Est : première étape franchie dans un processus très incertain","lien":"https://www.lesechos.fr/politique-societe/regions/sortie-de-lalsace-du-grand-est-premiere-etape-franchie-dans-un-processus-tres-incertain-2225354","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Institutionnel","resume":"L'Assemblée nationale a adopté mercredi en première lecture un texte transpartisan visant à conférer à l'Alsace un statut particulier distinct de la région Grand Est. Malgré ce vote favorable, l'issue finale de cette réforme territoriale reste très incertaine et devra franchir de nombreuses étapes législatives.","importance":2},{"titre":"Présidentielle 2027 : la primaire de la gauche minée par les turpitudes internes du PS","lien":"https://www.lesechos.fr/politique-societe/politique/presidentielle-2027-la-primaire-de-la-gauche-minee-par-les-turpitudes-internes-du-ps-2225320","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Droite","resume":"Le bureau national du Parti socialiste a été le théâtre mardi soir de nouvelles tensions entre Olivier Faure et ses détracteurs concernant l'organisation de l'élection présidentielle. Parallèlement, les partisans d'une consultation ouverte persistent dans leur démarche et tentent de redonner un nouvel élan à leur initiative.","importance":2},{"titre":"RN-LFI : au cœur du piège populiste","lien":"https://www.lesechos.fr/politique-societe/politique/rn-lfi-au-coeur-du-piege-populiste-2225312","source":"Les Echos - politique & société","date":"2026-04-11","theme":"RN","resume":"Un débat entre Jean-François Copé (LR) et Jérôme Sainte-Marie (RN) explore les stratégies pour contrer les dynamiques populistes. La discussion soulève la difficulté de critiquer ces mouvements sans tomber dans une posture élitiste vis-à-vis des classes populaires.","importance":2},{"titre":"Baisse de la démographie scolaire : comment faire face à la « vague sismique »","lien":"https://www.lesechos.fr/politique-societe/education/baisse-de-la-demographie-scolaire-comment-faire-face-a-la-vague-sismique-2225299","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Institutionnel","resume":"Edouard Geffray, à la tête du ministère de l'Education nationale, organise des consultations avec les organisations syndicales du secteur éducatif et les représentants locaux. L'objectif est d'échanger sur les différentes options d'organisation du système éducatif à venir.","importance":2},{"titre":"Les stratégies des jeunes bacheliers qui filent directement à l'étranger","lien":"https://www.lesechos.fr/politique-societe/education/ils-postulent-a-un-nombre-restreint-duniversites-et-visent-le-tres-haut-du-panier-les-strategies-des-jeunes-bacheliers-qui-filent-directement-a-letranger-2225216","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Institutionnel","resume":"Les étudiants français souhaitant poursuivre leurs études supérieures hors de France doivent désormais composer avec les incertitudes liées aux décisions politiques américaines et aux conséquences du Brexit. Ces facteurs géopolitiques influencent directement leurs choix d'orientation et les conditions d'accès aux universités internationales.","importance":2},{"titre":"« Mon objectif, c'est de ne pas avoir de nouveaux reculs environnementaux dans le débat parlementaire »","lien":"https://www.lesechos.fr/politique-societe/politique/mon-objectif-cest-de-ne-pas-avoir-de-nouveaux-reculs-environnementaux-dans-le-debat-parlementaire-2225215","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Macron","resume":"La députée du Finistère et présidente de la commission développement durable à l'Assemblée nationale s'exprime sur le projet de loi d'urgence agricole adopté en Conseil des ministres. Elle défend la nécessité de préserver les avancées écologiques lors des discussions parlementaires à venir.","importance":2},{"titre":"Cessez-le-feu en Iran : Lecornu demande une baisse rapide des prix de l'essence","lien":"https://www.lesechos.fr/politique-societe/gouvernement/cessez-le-feu-en-iran-lecornu-demande-une-baisse-rapide-des-prix-de-lessence-2225213","source":"Les Echos - politique & société","date":"2026-04-11","theme":"Droite","resume":"Suite à la trêve de quinze jours annoncée entre Washington et Téhéran, le chef du gouvernement exige que la diminution du coût à la pompe soit proportionnelle à la hausse précédente. Le ministère de l'Économie convoquera l'ensemble des acteurs du secteur pétrolier.","importance":2},{"titre":"« À l'automne, nos courbes se croiseront » : face à Édouard Philippe, Bruno Retailleau veut cultiver son indépendance","lien":"https://www.lefigaro.fr/politique/a-l-automne-nos-courbes-se-croiseront-face-a-edouard-philippe-bruno-retailleau-veut-cultiver-son-independance-20260411","source":"Le Figaro - Politique","date":"2026-04-11","theme":"Droite","resume":"Le président des Républicains prépare un programme de rupture inspiré de François Fillon pour la présidentielle, tout en n'écartant pas l'hypothèse d'une primaire contre le maire du Havre. Il cherche à convaincre les électeurs hésitants en s'inscrivant dans l'héritage de son ami politique, dont l'échec de 2017 continue de marquer le parti.","importance":2}];
const couleurs = {"LFI":{"hex":"#e53e3e"},"RN":{"hex":"#1a3a6e"},"Macron":{"hex":"#1D9E75"},"Droite":{"hex":"#BA7517"},"Institutionnel":{"hex":"#888780"}};
const couleursTexte = {"RN":"#4a7ac8"};

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Institutionnel') === filter);
  document.getElementById('art-count').textContent = filtered.length + ' résultats';
  document.getElementById('art-list').innerHTML = filtered.map(a => {
    const c = couleurs[a.theme] || { hex: '#888780' };
    const textColor = couleursTexte[a.theme] || c.hex;
    return `<a class="article-row" href="${a.lien}" target="_blank">
      <div class="theme-stripe" style="background:${c.hex}"></div>
      <div style="flex:1;min-width:0">
        <div class="art-title">${a.titre}</div>
        ${a.resume ? `<div class="art-resume">${a.resume}</div>` : ''}
        <div class="art-meta">
          <span class="src-pill">${a.source || ''}</span>
          <span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${c.hex}22;color:${textColor};border:1px solid ${c.hex}44;font-weight:700">${a.theme}</span>
          ${a.date ? `<span class="date-pill">${a.date}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const color = pill.dataset.color;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active');
    const c = p.dataset.color;
    p.style.borderColor = c === '#fff' ? '#ffffff44' : c + '44';
    p.style.background = c === '#fff' ? '#ffffff11' : c + '11';
    p.style.opacity = '.6';
  });
  pill.classList.add('active');
  pill.style.borderColor = color;
  pill.style.background = color === '#fff' ? '#ffffff22' : color + '22';
  pill.style.opacity = '1';
  render(pill.dataset.f);
});

const firstPill = document.querySelector('.pill');
if (firstPill) {
  firstPill.classList.add('active');
  firstPill.style.borderColor = firstPill.dataset.color;
  firstPill.style.background = firstPill.dataset.color + '22';
  firstPill.style.opacity = '1';
  render(firstPill.dataset.f);
}
</script>
</body>
</html>
