<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif}
.mc{background:#0a0a0f;color:#e8e8e8;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #222}
.title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.subtitle{font-size:12px;color:#666;margin-top:4px}
.top-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.metric{background:#12121a;border:1px solid #222;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.source-list{display:flex;flex-direction:column;gap:4px}
.source-item{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.source-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rep-row:last-child{margin-bottom:0}
.rep-name{font-size:12px;font-weight:600;width:110px;flex-shrink:0}
.rep-bar-wrap{flex:1;height:5px;background:#1e1e2a;border-radius:3px}
.rep-bar{height:5px;border-radius:3px}
.rep-count{font-size:11px;color:#555;width:24px;text-align:right;flex-shrink:0}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;opacity:.6}
.pill:hover{opacity:.85;transform:scale(1.05)}
.pill.active{opacity:1;transform:scale(1.08);border-width:2px}
.articles-section{background:#12121a;border:1px solid #222;border-radius:10px;padding:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-bottom:1px solid #1a1a24;border-radius:6px;text-decoration:none}
.article-row:hover{background:#16161e}
.article-row:last-child{border-bottom:none}
.theme-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px}
.art-title{font-size:13px;color:#ddd;line-height:1.4;font-weight:500}
.art-resume{font-size:11px;color:#888;margin-top:4px;line-height:1.4}
.art-meta{font-size:11px;margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.src-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#1e1e2a;color:#bbb;font-weight:700}
.date-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#0a1a2a;color:#38bdf8;font-weight:700}
</style>
</head>

<script>
const data = [{"titre":"Violences sexuelles dans le périscolaire à Paris : les parents de l'école maternelle Saint-Dominique racontent leur vie fracassée et la rude bataille judiciaire","lien":"https://www.lemonde.fr/societe/article/2026/04/05/violences-sexuelles-dans-le-periscolaire-a-paris-les-parents-de-l-ecole-maternelle-saint-dominique-racontent-leur-vie-fracassee-et-la-rude-bataille-judiciaire_6676878_3224.html","source":"Le Monde - Politique","date":"2026-04-05","theme":"Institutionnel","resume":"Des dizaines de familles d'un établissement public du 7e arrondissement parisien ont déposé plainte contre des animateurs pour des maltraitances et agressions sur de très jeunes élèves. Une mère témoigne des signaux d'alerte répétés chez sa fille de 4 ans, contrainte d'éloigner ses enfants de Paris pour les protéger, au prix d'une séparation familiale déchirante.","importance":2},{"titre":"Région Alsace : dix présidents de région s'opposent à la sortie du Grand Est inscrite dans une proposition de loi","lien":"https://www.lemonde.fr/politique/article/2026/04/05/region-alsace-dix-presidents-de-region-s-opposent-a-la-sortie-du-grand-est-inscrite-dans-une-proposition-de-loi_6676736_823448.html","source":"Le Monde - Politique","date":"2026-04-05","theme":"Institutionnel","resume":"Dix responsables régionaux, dont Franck Leroy, Carole Delga et Valérie Pécresse, publient une tribune pour dénoncer le projet de collectivité unique alsacienne qui entraînerait un détachement du Grand-Est. Ils considèrent cette initiative comme une menace pour l'unité nationale et une erreur majeure sur les plans politique et historique, à la veille de son examen parlementaire du 7 avril.","importance":2},{"titre":"« C'est la secte du temple solaire où on verrouille tout » : la présidentielle en ligne de mire, LR étale ses divisions","lien":"https://www.lesechos.fr/politique-societe/politique/cest-la-secte-du-temple-solaire-ou-on-verrouille-tout-la-presidentielle-en-ligne-de-mire-lr-etale-ses-divisions-2224850","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Droite","resume":"Bruno Retailleau maintient sa candidature pour représenter Les Républicains à la présidentielle malgré les tensions internes et la concurrence d'Édouard Philippe. Une procédure accélérée pourrait permettre aux adhérents de le désigner directement le 18 avril, évitant ainsi l'organisation d'une primaire ouverte.","importance":2},{"titre":"Affaire du financement libyen : interrogatoire décisif pour Nicolas Sarkozy","lien":"https://www.lesechos.fr/politique-societe/politique/affaire-du-financement-libyen-interrogatoire-decisif-pour-nicolas-sarkozy-2224816","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Droite","resume":"Après trois semaines d'audience, l'ex-chef de l'État comparaît devant la juridiction d'appel parisienne le mardi 7 avril. Il devra répondre des accusations portant sur un soutien financier présumé du gouvernement de Mouammar Kadhafi à sa candidature présidentielle de 2007.","importance":3},{"titre":"« La consigne, c'est de taper matin, midi et soir » : pourquoi LR cherche à installer LFI comme son meilleur ennemi","lien":"https://www.lesechos.fr/politique-societe/politique/la-consigne-cest-de-taper-matin-midi-et-soir-pourquoi-lr-cherche-a-installer-lfi-comme-son-meilleur-ennemi-2224761","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Droite","resume":"Bruno Retailleau adopte une stratégie délibérée consistant à cibler systématiquement la formation de Jean-Luc Mélenchon. Cette approche répond à plusieurs objectifs politiques pour Les Républicains qui positionnent ainsi la gauche radicale comme leur adversaire prioritaire.","importance":2},{"titre":"Périscolaire à Paris : Emmanuel Grégoire dévoile son plan d'action pour « garantir la transparence totale »","lien":"https://www.lesechos.fr/politique-societe/education/periscolaire-a-paris-emmanuel-gregoire-devoile-son-plan-daction-pour-garantir-la-transparence-totale-2224698","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Institutionnel","resume":"L'édile parisien présente son dispositif comprenant un système de remontée d'informations facilité et clairement identifié. Des actions immédiates sont prévues ainsi que le renforcement des équipes d'animation avec des procédures de vérification renforcées.","importance":2},{"titre":"Les collectivités locales appelées à accélérer leur transition climatique","lien":"https://www.lesechos.fr/politique-societe/societe/les-collectivites-locales-appelees-a-accelerer-leur-transition-climatique-2224660","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Institutionnel","resume":"Le Haut Conseil pour le climat publie un rapport vendredi pointant les disparités territoriales dans la mise en œuvre des politiques environnementales. L'instance recommande une accélération des efforts locaux pour atteindre les cibles fixées dans la planification écologique nationale.","importance":2},{"titre":"SONDAGE EXCLUSIF - Édouard Philippe poussé dans l'opinion par sa réélection au Havre","lien":"https://www.lesechos.fr/politique-societe/politique/sondage-exclusif-edouard-philippe-pousse-dans-lopinion-par-sa-reelection-au-havre-2224641","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Droite","resume":"Selon le baromètre Elabe pour Les Echos, l'ancien chef du gouvernement profite de son succès électoral dans sa ville normande pour progresser significativement dans les enquêtes d'opinion. Il talonne désormais le président du Rassemblement National en occupant la position de dauphin.","importance":2},{"titre":"Décès de l'ancien ministre socialiste Louis Besson, l'homme du droit au logement","lien":"https://www.lesechos.fr/politique-societe/politique/deces-de-lancien-ministre-socialiste-louis-besson-lhomme-du-droit-au-logement-2224631","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Institutionnel","resume":"Louis Besson, figure du Parti socialiste, s'est éteint jeudi. Il avait notamment porté la législation fondatrice sur l'accès au logement et la loi relative à la solidarité et au renouvellement urbains.","importance":2},{"titre":"« Je veux me mouiller » : à Bordeaux, Sébastien Lecornu tente de contrer le procès en immobilisme","lien":"https://www.lesechos.fr/politique-societe/gouvernement/je-veux-me-mouiller-a-bordeaux-sebastien-lecornu-tente-de-contrer-le-proces-en-immobilisme-2224618","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Macron","resume":"Le chef du gouvernement s'est rendu en Gironde pour promouvoir le texte législatif sur la sécurité du quotidien. Son déplacement a été marqué par une clarification nécessaire concernant les recettes budgétaires supplémentaires, dans un contexte de tensions liées à la hausse des tarifs à la pompe.","importance":2},{"titre":"Présidentielle : mythes et réalités d'un projet réconciliateur","lien":"https://www.lesechos.fr/politique-societe/politique/idees-mythes-et-realites-dun-debat-reconciliateur-2224586","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Institutionnel","resume":"À douze mois du scrutin présidentiel, les responsables politiques affirment vouloir regagner la confiance de l'électorat en privilégiant des débats de fond. Cette annonce de recentrage sur les enjeux substantiels reste cependant à confirmer dans les faits.","importance":2},{"titre":"SONDAGE EXCLUSIF - La cote de confiance d'Emmanuel Macron repart à la baisse face à la crise des carburants","lien":"https://www.lesechos.fr/politique-societe/emmanuel-macron-president/sondage-exclusif-la-cote-de-confiance-demmanuel-macron-repart-a-la-baisse-face-a-la-baisse-face-a-la-crise-des-carburants-2224550","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Macron","resume":"Le rebond de popularité présidentielle consécutif au conflit militaire en Iran n'aura duré qu'un mois. La population lui reproche aujourd'hui son impuissance à apporter des solutions efficaces pour contrer l'inflation des prix à la pompe.","importance":2},{"titre":"Travail au noir, arrêt maladie falsifié... comment les députés ont durci le projet de loi anti-fraudes","lien":"https://www.lesechos.fr/politique-societe/societe/travail-au-noir-arret-maladie-falsifie-comment-les-deputes-ont-durci-le-projet-de-loi-anti-fraudes-2224548","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Institutionnel","resume":"L'Assemblée nationale a achevé mercredi l'examen d'un texte visant à lutter contre les fraudes sociales et fiscales. Les parlementaires ont adopté de multiples amendements qui renforcent les pénalités prévues initialement, avant le scrutin définitif prévu mardi prochain.","importance":2},{"titre":"Nouvelle-Calédonie : la réforme constitutionnelle rejetée, l'exécutif dans l'impasse","lien":"https://www.lesechos.fr/politique-societe/politique/nouvelle-caledonie-la-reforme-constitutionnelle-rejetee-lexecutif-dans-limpasse-2224494","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Institutionnel","resume":"L'Assemblée nationale a bloqué le projet avant même son examen en séance, mettant fin aux espoirs de modification constitutionnelle. Face à cet échec parlementaire, l'exécutif se tourne vers une consultation populaire directe auprès des Calédoniens.","importance":3},{"titre":"Maud Bregeon : face à la crise énergétique, « il faut prévoir un plan d'incitation à la sobriété »","lien":"https://www.lesechos.fr/politique-societe/regions/la-piste-de-contrats-financiers-entre-letat-et-les-collectivites-locales-fait-son-retour-2224345","source":"Les Echos - politique & société","date":"2026-04-05","theme":"Macron","resume":"La ministre déléguée à l'Energie exclut tout dispositif de soutien massif aux carburants fossiles malgré la flambée des cours pétroliers. Elle privilégie une stratégie orientée vers le développement de l'électrification et des mesures encourageant la diminution de l'usage des hydrocarbures.","importance":2},{"titre":"François d'Orcival : Tout est quartier sensible","lien":"https://www.valeursactuelles.com/clubvaleurs/politique/francois-dorcival-tout-est-quartier-sensible","source":"Valeurs Actuelles - Politique","date":"2026-04-05","theme":"Droite","resume":"L'éditorialiste affirme qu'aucune forme de rébellion ou de révolte contre l'autorité de l'État n'est acceptable sur le territoire français. Cette position rappelle la nécessité de maintenir l'ordre républicain face aux tensions dans certaines zones du pays.","importance":2}];
const couleurs = {"LFI":{"hex":"#e53e3e"},"RN":{"hex":"#1a3a6e"},"Macron":{"hex":"#1D9E75"},"Droite":{"hex":"#BA7517"},"Institutionnel":{"hex":"#888780"}};
const couleursTexte = {"RN":"#4a7ac8"};

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Institutionnel') === filter);
  document.getElementById('art-count').textContent = filtered.length + ' résultats';
  document.getElementById('art-list').innerHTML = filtered.map(a => {
    const c = couleurs[a.theme] || { hex: '#888780' };
    const textColor = couleursTexte[a.theme] || c.hex;
    return `<a class="article-row" href="${a.lien}" target="_blank">
      <div class="theme-stripe" style="background:${c.hex}"></div>
      <div style="flex:1;min-width:0">
        <div class="art-title">${a.titre}</div>
        ${a.resume ? `<div class="art-resume">${a.resume}</div>` : ''}
        <div class="art-meta">
          <span class="src-pill">${a.source || ''}</span>
          <span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${c.hex}22;color:${textColor};border:1px solid ${c.hex}44;font-weight:700">${a.theme}</span>
          ${a.date ? `<span class="date-pill">${a.date}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const color = pill.dataset.color;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active');
    const c = p.dataset.color;
    p.style.borderColor = c === '#fff' ? '#ffffff44' : c + '44';
    p.style.background = c === '#fff' ? '#ffffff11' : c + '11';
    p.style.opacity = '.6';
  });
  pill.classList.add('active');
  pill.style.borderColor = color;
  pill.style.background = color === '#fff' ? '#ffffff22' : color + '22';
  pill.style.opacity = '1';
  render(pill.dataset.f);
});

const firstPill = document.querySelector('.pill');
if (firstPill) {
  firstPill.classList.add('active');
  firstPill.style.borderColor = firstPill.dataset.color;
  firstPill.style.background = firstPill.dataset.color + '22';
  firstPill.style.opacity = '1';
  render(firstPill.dataset.f);
}
</script>
